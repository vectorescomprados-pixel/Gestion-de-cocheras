<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>SISTEMA REPARADO</title>
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; padding: 20px; }
        .box { border: 2px solid #2a3942; padding: 20px; border-radius: 10px; background: #111b21; margin-bottom: 20px; }
        #log { background: #000; color: #0f0; padding: 10px; font-family: monospace; height: 150px; overflow-y: auto; border: 1px solid #333; margin-top: 10px; white-space: pre-wrap; }
        .card { background: #1c272e; padding: 10px; margin-top: 10px; border-radius: 5px; border-left: 5px solid #1d6ed7; }
        input[type="file"] { background: #1d6ed7; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <h3>PASO 1: Seleccionar Archivo</h3>
    <input type="file" id="csv-input" accept=".csv">
    
    <div id="log">Estado: Esperando archivo...</div>
</div>

<div class="box">
    <button style="background:red; color:white; padding:10px; width:100%; border:none; cursor:pointer;" id="btn-borrar">BORRAR TODO</button>
</div>

<div id="resultado"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");

    const logger = (msg) => {
        const l = document.getElementById('log');
        l.innerText += "\n> " + msg;
        l.scrollTop = l.scrollHeight;
    };

    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        const res = document.getElementById('resultado');
        res.innerHTML = snap.docs.map(d => {
            const i = d.data();
            return `<div class="card">UF: ${i.uf} | Cochera: ${i.cochera}<br>Prop: ${i.prop}</div>`;
        }).join('');
    });

    // Cambiamos a 'input' para máxima compatibilidad
    document.getElementById('csv-input').addEventListener('input', function(e) {
        const file = e.target.files;
        if (!file) return;

        logger("¡ARCHIVO DETECTADO! Nombre: " + file.name);
        
        const reader = new FileReader();
        reader.onload = async (ev) => {
            try {
                const texto = ev.target.result;
                const lineas = texto.split(/\r?\n/).filter(l => l.trim() !== "");
                logger("Líneas leídas: " + lineas.length);

                const batch = writeBatch(db);
                let contador = 0;

                for (let i = 1; i < lineas.length; i++) {
                    const columnas = lineas[i].split(';');
                    if (columnas.length < 1) continue;

                    const rawUF = columnas.trim();
                    if (!rawUF || isNaN(parseInt(rawUF))) continue;

                    const ufNorm = rawUF.padStart(4, '0');
                    const cochera = columnas ? columnas.trim() : rawUF;
                    const prop = columnas ? columnas.trim() : "S/D";
                    const inq = columnas ? columnas.trim() : "";
                    const nombreFinal = inq ? prop + " / " + inq : prop;

                    const ref = doc(db, "cocheras_edificio", "UF-" + ufNorm);
                    batch.set(ref, { uf: ufNorm, cochera, prop: nombreFinal, patente: "" }, { merge: true });
                    contador++;
                }

                logger("Enviando " + contador + " filas a Firebase...");
                await batch.commit();
                logger("¡LISTO! Datos guardados.");

            } catch (err) {
                logger("ERROR: " + err.message);
            }
        };
        reader.readAsText(file, "ISO-8859-1");
    });

    document.getElementById('btn-borrar').onclick = async () => {
        if(!confirm("¿Borrar?")) return;
        const snap = await getDocs(colRef);
        const b = writeBatch(db);
        snap.docs.forEach(d => b.delete(d.ref));
        await b.commit();
        logger("Base borrada.");
    };
</script>
</body>
</html>
