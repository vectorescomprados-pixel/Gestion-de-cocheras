<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>SISTEMA COCHERAS - SOLUCIÓN FORZADA</title>
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; padding: 15px; }
        .box { border: 1px solid #2a3942; padding: 15px; border-radius: 10px; background: #111b21; margin-bottom: 15px; }
        #log { background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 11px; height: 120px; overflow-y: auto; border: 1px solid #333; }
        .card { background: #1c272e; padding: 12px; margin-top: 8px; border-radius: 8px; border-left: 5px solid #1d6ed7; }
        .input-file { background: #1d6ed7; color: white; padding: 15px; width: 100%; border-radius: 8px; box-sizing: border-box; cursor: pointer; border: none; font-weight: bold; }
        .btn-borrar { background: #444; color: #ccc; padding: 8px; width: 100%; border: none; margin-top: 10px; border-radius: 5px; font-size: 11px; }
    </style>
</head>
<body>

<div class="box">
    <label style="display:block; margin-bottom:10px; color:#8696a0;">SELECCIONE EL ARCHIVO CSV:</label>
    <input type="file" id="archivo-real" class="input-file">
    <div id="log">Estado: Esperando...</div>
</div>

<div id="lista"></div>

<div class="box">
    <button class="btn-borrar" id="btn-borrar">LIMPIAR BASE DE DATOS</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");

    const logger = (m) => {
        const l = document.getElementById('log');
        l.innerText += "\n> " + m;
        l.scrollTop = l.scrollHeight;
    };

    // Ver datos
    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        document.getElementById('lista').innerHTML = snap.docs.map(d => {
            const i = d.data();
            return `<div class="card"><b>UF ${i.uf}</b> (Cochera ${i.cochera})<br>${i.prop}</div>`;
        }).join('');
    });

    // PROCESAMIENTO ULTRA-SIMPLE
    const input = document.getElementById('archivo-real');
    
    input.addEventListener('change', function() {
        // En lugar de acceder a file.name, probamos si el objeto existe
        if (!this.files || this.files.length === 0) {
            logger("Error: El navegador no entregó el archivo.");
            return;
        }

        const miArchivo = this.files;
        logger("Archivo recibido correctamente.");

        const lector = new FileReader();
        
        lector.onload = async (e) => {
            const contenido = e.target.result;
            if (!contenido) {
                logger("Error: El contenido está vacío.");
                return;
            }

            const filas = contenido.split(/\r?\n/).filter(f => f.trim().length > 0);
            logger("Líneas leídas: " + filas.length);

            const batch = writeBatch(db);
            let count = 0;

            for (let i = 1; i < filas.length; i++) {
                const columnas = filas[i].split(';');
                
                // Si la columna 0 (UF) no existe, saltamos
                if (!columnas) continue;
                
                const ufLimpia = columnas.trim().replace(/"/g, '');
                if (isNaN(parseInt(ufLimpia))) continue;

                const ufID = ufLimpia.padStart(4, '0');
                const coch = (columnas && columnas.trim() !== "") ? columnas.trim() : ufLimpia;
                const p = (columnas && columnas.trim() !== "") ? columnas.trim() : "S/D";
                const inq = (columnas && columnas.trim() !== "") ? columnas.trim() : "";
                
                const ref = doc(db, "cocheras_edificio", "UF-" + ufID);
                batch.set(ref, {
                    uf: ufID,
                    cochera: coch,
                    prop: inq ? p + " / " + inq : p,
                    patente: ""
                }, { merge: true });

                count++;
            }

            logger("Enviando " + count + " registros...");
            await batch.commit();
            logger("¡FINALIZADO!");
        };

        lector.readAsText(miArchivo, "ISO-8859-1");
    });

    document.getElementById('btn-borrar').onclick = async () => {
        const snap = await getDocs(colRef);
        const b = writeBatch(db);
        snap.docs.forEach(d => b.delete(d.ref));
        await b.commit();
        logger("Base borrada.");
    };
</script>
</body>
</html>
