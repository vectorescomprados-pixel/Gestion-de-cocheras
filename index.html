<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>SISTEMA COCHERAS - FIX</title>
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; padding: 20px; }
        .box { border: 1px solid #2a3942; padding: 15px; border-radius: 10px; margin-bottom: 20px; background: #111b21; }
        button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-blue { background: #1d6ed7; color: white; }
        .btn-red { background: #e91e63; color: white; }
        #log { background: black; color: #00ff00; padding: 10px; font-family: monospace; font-size: 11px; height: 150px; overflow-y: auto; border: 1px solid #333; line-height: 1.4; }
        .card { background: #1c272e; padding: 12px; margin-top: 10px; border-radius: 8px; border-left: 5px solid #f59e0b; }
    </style>
</head>
<body>

<div class="box">
    <div id="log">SISTEMA INICIADO: Esperando archivo...</div>
</div>

<div class="box">
    <button class="btn-red" id="btn-borrar">BORRAR TODO</button>
    <button class="btn-blue" onclick="document.getElementById('csv-input').click()">CARGAR PRUEBA.CSV</button>
    <input type="file" id="csv-input" accept=".csv" style="display:none">
</div>

<div id="resultado"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");

    const logger = (msg) => {
        const l = document.getElementById('log');
        l.innerHTML += `<br>> ${msg}`;
        l.scrollTop = l.scrollHeight;
    };

    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        const res = document.getElementById('resultado');
        res.innerHTML = snap.docs.map(d => {
            const i = d.data();
            return `<div class="card"><b>UF ${i.uf}</b> - Cochera: ${i.cochera}<br>${i.prop}</div>`;
        }).join('');
    });

    document.getElementById('csv-input').onchange = (e) => {
        const file = e.target.files;
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (ev) => {
            try {
                const texto = ev.target.result;
                const lineas = texto.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
                
                logger(`Archivo leído. Filas: ${lineas.length}`);

                let batch = writeBatch(db);
                let contador = 0;

                // Empezamos desde i=1 para saltar encabezado
                for (let i = 1; i < lineas.length; i++) {
                    const filaActual = lineas[i];
                    
                    // Detectar separador (punto y coma o coma)
                    let columnas = [];
                    if (filaActual.includes(';')) {
                        columnas = filaActual.split(';');
                    } else {
                        columnas = filaActual.split(',');
                    }

                    // VALIDACIÓN DE SEGURIDAD
                    if (columnas.length === 0 || !columnas) {
                        logger(`Fila ${i} saltada: está vacía.`);
                        continue;
                    }

                    // Extraer datos con valores por defecto si son undefined
                    const rawUF = columnas.replace(/"/g, '').trim();
                    if (isNaN(parseInt(rawUF))) {
                        logger(`Fila ${i} saltada: UF no es número.`);
                        continue;
                    }

                    const uf = rawUF.padStart(4, '0');
                    // Si la columna 1 no existe o es vacía, usamos el número de UF
                    const cochera = (columnas && columnas.trim() !== "") ? columnas.replace(/"/g, '').trim() : rawUF;
                    const prop = (columnas && columnas.trim() !== "") ? columnas.replace(/"/g, '').trim() : "SIN NOMBRE";

                    const ref = doc(db, "cocheras_edificio", "UF-" + uf);
                    batch.set(ref, { 
                        uf: uf, 
                        cochera: cochera, 
                        prop: prop,
                        patente: "",
                        auto: "" 
                    }, { merge: true });
                    
                    contador++;
                }

                if (contador > 0) {
                    logger(`Enviando ${contador} registros...`);
                    await batch.commit();
                    logger("¡TERMINADO! Datos en pantalla.");
                } else {
                    logger("No se encontraron datos válidos para cargar.");
                }

            } catch (err) {
                logger("FALLO CRÍTICO: " + err.message);
                console.error(err);
            }
        };
        reader.readAsText(file, "ISO-8859-1");
    };

    document.getElementById('btn-borrar').onclick = async () => {
        try {
            const snap = await getDocs(colRef);
            const b = writeBatch(db);
            snap.docs.forEach(d => b.delete(d.ref));
            await b.commit();
            logger("Base de datos borrada.");
        } catch (e) { logger("Error al borrar: " + e.message); }
    };
</script>
</body>
</html>
