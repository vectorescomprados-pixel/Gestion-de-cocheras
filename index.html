<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Carga - Actualizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .btn-home { transition: all 0.2s ease; }
        .btn-home:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [inquilino, setInquilino] = useState('');
            const [monto, setMonto] = useState('');

            // Lógica para que los íconos carguen correctamente
            useEffect(() => {
                lucide.createIcons();
            }, []);

            // Función para volver al HUB (ajustá el "/" por tu ruta real si es necesario)
            const irAlHub = () => {
                console.log("Navegando al Hub Central...");
                window.location.href = '/'; // Esto te lleva a la raíz
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col p-5">
                    
                    {/* Header: Botón Casita (Igual a tus otras Apps) */}
                    <header className="flex items-center justify-between mb-8">
                        <button 
                            onClick={irAlHub}
                            className="btn-home p-3 bg-white rounded-2xl shadow-md border border-gray-100 text-blue-500 hover:shadow-lg"
                        >
                            <i data-lucide="home" style={{width: '24px', height: '24px'}}></i>
                        </button>
                        <h1 className="text-xl font-bold text-gray-700">Carga de Datos</h1>
                        <div className="w-12"></div> {/* Espaciador central */}
                    </header>

                    <div className="space-y-6">
                        
                        {/* Fila de campos: Inquilino (Manual) e Inquilino (Espejo) */}
                        <div className="grid grid-cols-2 gap-4">
                            
                            {/* Campo de Entrada Principal */}
                            <div className="space-y-2">
                                <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">
                                    Inquilino
                                </label>
                                <div className="relative">
                                    <input 
                                        type="text" 
                                        value={inquilino}
                                        onChange={(e) => setInquilino(e.target.value)}
                                        placeholder="Escribir..."
                                        className="w-full p-4 bg-white rounded-2xl shadow-sm border border-transparent focus:border-blue-300 focus:ring-4 focus:ring-blue-100 outline-none transition-all text-gray-700"
                                    />
                                </div>
                            </div>

                            {/* Campo Espejo (Sustituye a Cochera) */}
                            <div className="space-y-2">
                                <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">
                                    Inquilino
                                </label>
                                <div className="relative">
                                    <input 
                                        type="text" 
                                        value={inquilino} // Sincronización automática
                                        readOnly 
                                        className="w-full p-4 bg-gray-100 rounded-2xl border border-gray-200 text-gray-400 cursor-not-allowed outline-none font-medium"
                                    />
                                </div>
                            </div>
                        </div>

                        {/* Campo Monto de Pago */}
                        <div className="space-y-2">
                            <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">
                                Monto del Pago
                            </label>
                            <div className="relative flex items-center">
                                <span className="absolute left-4 text-gray-400 font-bold">$</span>
                                <input 
                                    type="number" 
                                    value={monto}
                                    onChange={(e) => setMonto(e.target.value)}
                                    placeholder="0.00"
                                    className="w-full p-4 pl-8 bg-white rounded-2xl shadow-sm border border-transparent focus:border-blue-300 focus:ring-4 focus:ring-blue-100 outline-none transition-all text-gray-700 font-bold"
                                />
                            </div>
                        </div>

                        {/* Botón Guardar */}
                        <button 
                            className="w-full bg-blue-500 text-white font-black py-5 rounded-3xl shadow-xl shadow-blue-200 hover:bg-blue-600 active:scale-95 transition-all text-sm tracking-widest mt-4"
                        >
                            CONFIRMAR CARGA
                        </button>
                    </div>

                    {/* Info de sistema */}
                    <footer className="mt-auto py-8 text-center">
                        <span className="text-[10px] text-gray-300 font-bold tracking-tighter uppercase">
                            Auto-sync: Inquilino ↔️ Campo_02
                        </span>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
