<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA COCHERAS - FINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; padding: 15px; margin: 0; }
        .header { position: sticky; top: 0; background: #0b141a; padding-bottom: 15px; z-index: 100; border-bottom: 1px solid #2a3942; }
        .search-box { width: 100%; padding: 12px 15px; background: #202c33; border: 1px solid #2a3942; border-radius: 10px; color: white; font-size: 16px; box-sizing: border-box; outline: none; margin-top: 10px; }
        
        #lista { display: flex; flex-direction: column; gap: 20px; margin-top: 20px; }
        .card { background: #111b21; padding: 20px; border-radius: 15px; border: 1px solid #202c33; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .uf-title { color: #3b82f6; font-weight: bold; font-size: 1.2em; margin: 0; }
        .prop-main { color: #e9edef; font-size: 1.1em; margin-top: 5px; display: block; }
        
        .header-icons { display: flex; gap: 15px; color: #8696a0; font-size: 1.2em; cursor: pointer; }
        .icon-edit { color: #2563eb; }
        
        .card-body { display: none; margin-top: 15px; border-top: 1px dashed #202c33; padding-top: 15px; }
        .card.expanded .card-body { display: block; }

        .data-group { margin-bottom: 12px; }
        .blue-label { color: #3b82f6; font-weight: bold; font-size: 0.9em; display: block; margin-bottom: 4px; }
        .value-text { color: #e9edef; font-size: 1.05em; display: block; word-break: break-all; }

        .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border-radius: 8px; font-weight: bold; color: white; text-decoration: none; text-transform: uppercase; font-size: 0.9em; }
        .btn-call { background: #2563eb; }
        .btn-chat { background: #16a34a; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin: 10px 0; color: #e9edef;">Cocheras Edificio</h2>
    <input type="text" id="buscador" class="search-box" placeholder="Buscar UF o Propietario...">
</div>

<div id="lista"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");

    let todosLosDatos = [];

    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        todosLosDatos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderizar(todosLosDatos);
    });

    function renderizar(datos) {
        const contenedor = document.getElementById('lista');
        contenedor.innerHTML = ""; 

        datos.forEach((i, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.id = `card-${index}`;

            // Se muestran los datos tal cual vienen para evitar que el filtro los oculte si son "sucios"
            card.innerHTML = `
                <div class="card-header">
                    <div class="uf-info">
                        <h3 class="uf-title">UF: ${i.uf || '---'}</h3>
                        <span class="prop-main">${i.prop || '---'}</span>
                    </div>
                    <div class="header-icons">
                        <i class="fa-regular fa-eye" onclick="document.getElementById('card-${index}').classList.toggle('expanded')"></i>
                        <i class="fa-solid fa-pen-to-square icon-edit" onclick="document.getElementById('card-${index}').classList.toggle('expanded')"></i>
                    </div>
                </div>

                <div class="card-body">
                    <div class="data-group">
                        <span class="blue-label">Prop:</span>
                        <span class="value-text">${i.prop || '---'} |</span>
                    </div>
                    <div class="data-group">
                        <span class="blue-label">Tel:</span>
                        <span class="value-text">${i.tel_prop || 'N/C'}</span>
                    </div>
                    <div class="data-group">
                        <span class="blue-label">Inq:</span>
                        <span class="value-text">${i.inquilino || '---'} |</span>
                    </div>
                    <div class="data-group">
                        <span class="blue-label">Tel:</span>
                        <span class="value-text">${i.tel_inq || 'N/C'}</span>
                    </div>

                    <div class="card-actions">
                        <a href="tel:${i.tel_inq || i.tel_prop}" class="btn btn-call"><i class="fa-solid fa-phone"></i> LLAMAR</a>
                        <a href="https://wa.me/${String(i.tel_inq || i.tel_prop).replace(/[^0-9]/g, '')}" target="_blank" class="btn btn-chat"><i class="fa-brands fa-whatsapp"></i> CHAT</a>
                    </div>
                </div>
            `;
            contenedor.appendChild(card);
        });
    }

    document.getElementById('buscador').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtrados = todosLosDatos.filter(i => 
            String(i.uf).toLowerCase().includes(term) || 
            String(i.prop).toLowerCase().includes(term)
        );
        renderizar(filtrados);
    });
</script>
</body>
</html>
