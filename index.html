<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover">
    <title>SISTEMA COCHERAS PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --card: #1c272e; --blue: #1d6ed7; --red: #e91e63; --yellow: #f59e0b; --grey: #4b5563; --text: #e9edef; --border: #2a3942; }
        body { margin: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: var(--text); padding: 10px; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--card); padding: 10px; border-radius: 10px; border: 1px solid var(--border); text-align: center; }
        .stat-val { display: block; font-size: 22px; font-weight: 900; color: var(--blue); }
        .stat-label { font-size: 10px; text-transform: uppercase; color: #8696a0; font-weight: bold; }

        .panel { background: #111b21; padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
        .btn { height: 48px; border-radius: 8px; border: none; font-size: 10px; font-weight: 900; text-transform: uppercase; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-blue { background: var(--blue); } .btn-grey { background: var(--grey); } .btn-red { background: var(--red); } .btn-yellow { background: var(--yellow); color: #000; }

        .progress-container { width: 100%; height: 12px; background: #000; border-radius: 10px; margin: 15px 0; display: none; overflow: hidden; border: 1px solid var(--yellow); }
        #progress-bar { width: 0%; height: 100%; background: var(--yellow); transition: width 0.1s; }

        input, textarea { width: 100%; background: #1a242b; border: 1px solid #333; border-radius: 8px; color: #fff; padding: 12px; box-sizing: border-box; margin: 8px 0; font-size: 16px; outline: none; border-left: 3px solid var(--blue); }
        
        .card { background: #111b21; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .card-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: var(--blue); }
        .card-header { display: flex; align-items: center; padding: 18px; }
        .card-info { flex: 1; margin-left: 10px; }
        .card-title { font-size: 20px; font-weight: 900; color: var(--blue); }
        .card-actions { display: flex; gap: 18px; font-size: 18px; color: var(--blue); }
        
        .card-detail { display: none; padding: 0 18px 18px 24px; border-top: 1px solid var(--border); background: #162127; }
        .detail-item { margin-top: 10px; font-size: 13px; color: #8696a0; }
        .detail-item b { color: #fff; display: block; font-size: 14px; text-transform: uppercase; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 15px; }
        .modal-content { background: var(--card); width: 100%; max-width: 360px; padding: 25px; border-radius: 20px; border: 1px solid #32444e; }
    </style>
</head>
<body>

<div class="stats-grid">
    <div class="stat-card">
        <span class="stat-val" id="st-total">0</span>
        <span class="stat-label">Total UFs</span>
    </div>
    <div class="stat-card">
        <span class="stat-val" id="st-ocup" style="color:var(--yellow)">0</span>
        <span class="stat-label">Con Vehículo</span>
    </div>
</div>

<div class="panel">
    <div class="row">
        <button class="btn btn-yellow" id="btn-import"><i class="fas fa-file-upload"></i> SUBIR BASE</button>
        <button class="btn btn-red" id="btn-inf"><i class="fas fa-camera"></i> INFRACCIÓN</button>
        <button class="btn btn-grey" onclick="window.location.reload()"><i class="fas fa-sync"></i> RECARGAR</button>
    </div>
    
    <div class="progress-container" id="p-container">
        <div id="progress-bar"></div>
    </div>

    <input type="file" id="csv-file" accept=".csv" style="display:none">
    <input type="text" id="buscador" placeholder="Buscar UF, Propietario o Patente...">
</div>

<div id="lista-cocheras">
    <div style="text-align:center; padding:40px; color:#8696a0;">Cargando sistema...</div>
</div>

<div id="modal-form" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--blue); margin-top:0; font-size: 18px;">EDITAR <span id="label-uf-modal"></span></h2>
        <input type="text" id="f-prop" placeholder="Nombre Propietario / Inquilino">
        <input type="text" id="f-id" placeholder="Nro Cochera Asignada">
        <input type="text" id="f-patente" placeholder="Patente (Ej: AF123CD)">
        <input type="text" id="f-auto" placeholder="Vehículo (Marca/Modelo)">
        <textarea id="f-obs" placeholder="Observaciones adicionales..."></textarea>
        <div class="row" style="grid-template-columns: 1fr 1fr; margin-top:10px;">
            <button class="btn btn-blue" id="btn-save">GUARDAR</button>
            <button class="btn btn-grey" id="btn-close">VOLVER</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");
    const MASTER_WA = "1131552679";

    let todasLasCocheras = [];
    let currentDocId = null;

    // --- ESCUCHA DE DATOS ---
    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        // Solo traemos documentos que realmente tengan el campo 'uf'
        todasLasCocheras = snap.docs
            .map(d => ({id: d.id, ...d.data()}))
            .filter(item => item.uf !== undefined);
            
        actualizarEstadisticas();
        renderizar(todasLasCocheras);
    });

    function actualizarEstadisticas() {
        document.getElementById('st-total').innerText = todasLasCocheras.length;
        const ocupadas = todasLasCocheras.filter(c => c.patente && c.patente.trim() !== "").length;
        document.getElementById('st-ocup').innerText = ocupadas;
    }

    function renderizar(lista) {
        const cont = document.getElementById('lista-cocheras');
        if (lista.length === 0) {
            cont.innerHTML = '<div style="text-align:center; padding:40px; color:#8696a0;"><i class="fas fa-database" style="font-size:30px;margin-bottom:10px"></i><br>BASE VACÍA.<br>Presione "SUBIR BASE" y elija el CSV.</div>';
            return;
        }
        cont.innerHTML = '';
        lista.forEach(c => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-bar" style="background:${c.patente ? 'var(--yellow)' : 'var(--blue)'}"></div>
                <div class="card-header">
                    <div class="card-info">
                        <div class="card-title">UF ${c.uf}</div>
                        <div style="font-size:14px; color:#fff">${c.prop || '---'}</div>
                    </div>
                    <div class="card-actions">
                        <i class="far fa-eye btn-view" data-id="${c.id}"></i>
                        <i class="far fa-edit btn-edit" data-id="${c.id}"></i>
                    </div>
                </div>
                <div class="card-detail" id="detail-${c.id}">
                    <div class="detail-item">NRO COCHERA: <b>${c.id_cochera || 'NO ASIGNADA'}</b></div>
                    <div class="detail-item">PATENTE: <b>${c.patente || 'SIN CARGAR'}</b></div>
                    <div class="detail-item">VEHÍCULO: <b>${c.auto || 'SIN CARGAR'}</b></div>
                    <div class="detail-item">OBSERVACIONES: <b>${c.obs || 'Sin notas'}</b></div>
                </div>`;
            cont.appendChild(card);
        });
    }

    // --- ACCIONES DE EDICIÓN ---
    document.addEventListener('click', (e) => {
        if(e.target.classList.contains('btn-view')) {
            const id = e.target.getAttribute('data-id');
            const d = document.getElementById(`detail-${id}`);
            d.style.display = d.style.display === 'block' ? 'none' : 'block';
        }
        if(e.target.classList.contains('btn-edit')) {
            const id = e.target.getAttribute('data-id');
            const c = todasLasCocheras.find(x => x.id === id);
            currentDocId = id;
            document.getElementById('label-uf-modal').innerText = `(UF ${c.uf})`;
            document.getElementById('f-prop').value = c.prop || "";
            document.getElementById('f-id').value = c.id_cochera || "";
            document.getElementById('f-patente').value = c.patente || "";
            document.getElementById('f-auto').value = c.auto || "";
            document.getElementById('f-obs').value = c.obs || "";
            document.getElementById('modal-form').style.display = 'flex';
        }
    });

    document.getElementById('btn-close').onclick = () => document.getElementById('modal-form').style.display = 'none';
    
    document.getElementById('btn-save').onclick = async () => {
        if(!currentDocId) return;
        const btn = document.getElementById('btn-save');
        btn.innerText = "GUARDANDO...";
        await setDoc(doc(db, "cocheras_edificio", currentDocId), {
            prop: document.getElementById('f-prop').value,
            id_cochera: document.getElementById('f-id').value,
            patente: document.getElementById('f-patente').value.toUpperCase().trim(),
            auto: document.getElementById('f-auto').value,
            obs: document.getElementById('f-obs').value
        }, { merge: true });
        btn.innerText = "GUARDAR";
        document.getElementById('modal-form').style.display = 'none';
    };

    // --- IMPORTADOR CSV REPARADO ---
    document.getElementById('btn-import').onclick = () => document.getElementById('csv-file').click();
    document.getElementById('csv-file').onchange = (ev) => {
        const file = ev.target.files;
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (e) => {
            const content = e.target.result;
            // Maneja saltos de línea de Windows (\r\n) y Unix (\n)
            const lines = content.split(/\r?\n/).filter(l => l.trim() !== "");
            
            const bar = document.getElementById('progress-bar');
            const pCont = document.getElementById('p-container');
            pCont.style.display = 'block';
            bar.style.width = '2%'; // Inicio visual inmediato

            for(let i=0; i < lines.length; i++) {
                // Regex para ignorar comas dentro de comillas (como en "Fernandez, Sebastian")
                const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if (cols.length < 2) continue;

                let uf = cols.replace(/["']/g, "").trim();
                
                // Saltar si la primera columna no es un número (ej: encabezado "UF")
                if (isNaN(parseInt(uf))) continue;

                let propietario = cols[1]?.replace(/["']/g, "").trim() || "";
                let inquilino = cols[3]?.replace(/["']/g, "").trim() || "";
                
                let nombreCompleto = propietario;
                if (inquilino && inquilino !== "") {
                    nombreCompleto += " / Inq: " + inquilino;
                }

                // Guardar en Firebase con ID único por UF
                await setDoc(doc(db, "cocheras_edificio", "UF-" + uf), { 
                    uf: uf, 
                    prop: nombreCompleto 
                }, { merge: true });

                // Actualizar barra
                let porc = Math.round(((i + 1) / lines.length) * 100);
                bar.style.width = porc + '%';
            }
            
            setTimeout(() => {
                pCont.style.display = 'none';
                alert("Proceso finalizado. Se cargaron las unidades.");
                ev.target.value = ''; // Reset input file
            }, 800);
        };
        reader.readAsText(file);
    };

    // --- BUSCADOR ---
    document.getElementById('buscador').oninput = (e) => {
        const v = e.target.value.toLowerCase();
        renderizar(todasLasCocheras.filter(c => 
            c.uf.toLowerCase().includes(v) || 
            (c.prop && c.prop.toLowerCase().includes(v)) ||
            (c.patente && c.patente.toLowerCase().includes(v))
        ));
    };

    // --- INFRACCIÓN ---
    document.getElementById('btn-inf').onclick = () => {
        const camInput = document.createElement('input');
        camInput.type = 'file';
        camInput.accept = 'image/*';
        camInput.capture = 'environment';
        camInput.onchange = (e) => {
            if(e.target.files.length > 0) {
                const motivo = prompt("Ingrese el motivo de la infracción:");
                if(motivo) {
                    const msg = encodeURIComponent(`*REPORTE INFRACCIÓN*%0A*Motivo:* ${motivo}%0A_Por favor, envíe la foto a continuación._`);
                    window.open(`https://wa.me/549${MASTER_WA}?text=${msg}`);
                }
            }
        };
        camInput.click();
    };
</script>
</body>
</html>
