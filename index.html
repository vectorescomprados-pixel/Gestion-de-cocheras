<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SISTEMA COCHERAS - 87 UNIDADES</title>
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; margin: 20px; }
        textarea { width: 100%; min-height: 120px; background: #111b21; color: #00a884; border: 1px solid #2a3942; padding: 10px; border-radius: 8px; box-sizing: border-box; }
        .row { display: flex; gap: 12px; margin: 15px 0; }
        button { padding: 12px 20px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; flex: 1; text-transform: uppercase; }
        .danger { background: #ff3b30; color: white; }
        .primary { background: #00a884; color: white; }
        #status { color: #e1ff00; font-weight: bold; margin-bottom: 10px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #111b21; font-size: 14px; }
        th, td { border: 1px solid #2a3942; padding: 10px; text-align: left; }
        th { background: #202c33; color: #00a884; }
        .inq-text { color: #8696a0; font-size: 0.85em; display: block; margin-top: 4px; }
        .prop-text { font-weight: bold; color: #e9edef; }
    </style>
</head>
<body>

    <h3>🏠 Gestión de Cocheras (87 UF)</h3>
    <div id="status">Estado: Listo para cargar datos</div>

    <textarea id="csv-input" placeholder="Pega aquí las 87 líneas..."></textarea>

    <div class="row">
        <button class="primary" onclick="window.cargar()">Subir Datos</button>
        <button class="danger" onclick="window.limpiar()">Borrar Todo</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>UF</th>
                <th>Habitante (Prop / Inq)</th>
                <th>Cochera</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, writeBatch, getDocs, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo",
            authDomain: "gestionuf-remoto.firebaseapp.com",
            projectId: "gestionuf-remoto",
            storageBucket: "gestionuf-remoto.firebasestorage.app",
            messagingSenderId: "724452752860",
            appId: "1:724452752860:web:4d25585addcdcbd146e319"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "cocheras_edificio");

        window.cargar = async () => {
            const area = document.getElementById("csv-input");
            const texto = area.value.trim();
            if(!texto) return alert("Pega los datos primero.");

            const status = document.getElementById("status");
            status.innerText = "⌛ Procesando...";

            const lineas = texto.split("\n");
            const batch = writeBatch(db);
            let contador = 0;

            lineas.forEach(linea => {
                try {
                    const columnas = linea.split(",");
                    if (columnas.length >= 2) {
                        let ufRaw = columnas.toString().replace(/[^0-9]/g, '');
                        
                        if (ufRaw && ufRaw.length <= 4) {
                            let ufID = ufRaw.padStart(4, '0');
                            
                            // Separamos Propietario e Inquilino
                            // Propietario suele ser la columna 2, Inquilino la 4. 
                            let prop = (columnas || "S/D").trim();
                            let inq = (columnas || "").trim();
                            
                            const docRef = doc(db, "cocheras_edificio", "UF-" + ufID);
                            batch.set(docRef, {
                                uf: ufID,
                                prop: prop,
                                inquilino: inq,
                                cochera: ufRaw,
                                patente: ""
                            }, { merge: true });
                            contador++;
                        }
                    }
                } catch (e) {
                    console.log("Error en línea: ", linea);
                }
            });

            await batch.commit();
            status.innerText = "✅ ¡Listo! " + contador + " unidades procesadas.";
            area.value = "";
        };

        window.limpiar = async () => {
            if(!confirm("¿Borrar todo?")) return;
            const snap = await getDocs(colRef);
            const batch = writeBatch(db);
            snap.forEach(d => batch.delete(d.ref));
            await batch.commit();
        };

        onSnapshot(query(colRef, orderBy("uf")), (snap) => {
            const tbody = document.getElementById("tbody");
            tbody.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                const tr = document.createElement("tr");
                
                let habitanteHTML = `<span class="prop-text">${data.prop}</span>`;
                if(data.inquilino) {
                    habitanteHTML += `<span class="inq-text">🏠 Inquilino: ${data.inquilino}</span>`;
                }

                tr.innerHTML = `
                    <td style="color:#00a884; font-weight:bold;">🏠 ${data.uf}</td>
                    <td>${habitanteHTML}</td>
                    <td>${data.cochera}</td>
                `;
                tbody.appendChild(tr);
            });
        });
    </script>
</body>
</html>
