<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>SISTEMA COCHERAS PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --panel: #111b21; --card: #1c272e; --border: #2a3942; --text: #e9edef; --blue: #1d6ed7; --yellow: #f59e0b; --red: #e91e63; }
        body { margin: 0; background: var(--bg); font-family: sans-serif; color: var(--text); padding: 10px; }
        .panel { background: var(--panel); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn { height: 45px; border-radius: 8px; border: none; font-size: 10px; font-weight: bold; text-transform: uppercase; cursor: pointer; color: #fff; }
        .btn-yellow { background: var(--yellow); color: #000; }
        .btn-red { background: var(--red); }
        .btn-grey { background: #4b5563; }
        input { width: 100%; padding: 14px; margin-top: 10px; background: #1a242b; border: 1px solid var(--border); color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        .card { background: #111b21; border-radius: 10px; border: 1px solid var(--border); padding: 12px; margin-bottom: 8px; border-left: 5px solid var(--blue); }
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .uf-num { font-size: 18px; font-weight: bold; color: var(--blue); }
        .coch-num { background: var(--blue); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .prop-name { font-size: 14px; color: #fff; margin: 8px 0; }
        .patente-view { margin-top: 8px; font-family: monospace; color: var(--yellow); font-size: 15px; border-top: 1px solid #2a3942; padding-top: 8px; }
    </style>
</head>
<body>

<div class="panel">
    <div class="row">
        <button class="btn btn-yellow" onclick="document.getElementById('csv-file').click()">SUBIR CSV</button>
        <button class="btn btn-red" id="btn-borrar">BORRAR</button>
        <button class="btn btn-grey" onclick="location.reload()">RECARGAR</button>
    </div>
    <input type="file" id="csv-file" accept=".csv" style="display:none">
    <input type="text" id="buscador" placeholder="Buscar UF, Cochera o Nombre...">
</div>

<div id="lista"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, getDocs, writeBatch, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");
    let baseLocal = [];

    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        baseLocal = snap.docs.map(d => d.data());
        dibujar(baseLocal);
    });

    function dibujar(datos) {
        const contenedor = document.getElementById('lista');
        if (datos.length === 0) {
            contenedor.innerHTML = '<p style="text-align:center; color:#8696a0; padding:20px;">Base vacía. Cargue el archivo CSV.</p>';
            return;
        }
        contenedor.innerHTML = datos.map(i => `
            <div class="card">
                <div class="card-header">
                    <span class="uf-num">UF ${i.uf}</span>
                    <span class="coch-num">COCHERA ${i.cochera || 'S/N'}</span>
                </div>
                <div class="prop-name">${i.prop || 'S/D'}</div>
                <div class="patente-view"><i class="fas fa-car"></i> ${i.patente || 'SIN PATENTE'}</div>
            </div>
        `).join('');
    }

    document.getElementById('csv-file').onchange = (e) => {
        const file = e.target.files;
        if(!file) return;

        const reader = new FileReader();
        reader.onload = async (ev) => {
            const contenido = ev.target.result;
            const lineas = contenido.split(/\r?\n/).filter(l => l.trim().length > 0);
            
            alert("Archivo detectado: " + lineas.length + " filas encontradas. Iniciando carga...");

            let batch = writeBatch(db);
            let total = 0;

            for(let i = 1; i < lineas.length; i++) {
                // Detectamos si usa ; o ,
                let separador = lineas[i].includes(';') ? ';' : ',';
                const columnas = lineas[i].split(separador);
                
                let ufRaw = columnas?.trim().replace(/"/g, "");
                if(!ufRaw || isNaN(parseInt(ufRaw))) continue;

                const ufID = ufRaw.padStart(4, '0');
                
                // Mapeo dinámico según tu nueva estructura
                const nCochera = columnas?.trim().replace(/"/g, "") || ufRaw;
                const prop = columnas?.trim().replace(/"/g, "") || "";
                const inq = columnas?.trim().replace(/"/g, "") || "";
                const nombreFull = inq ? `${prop} / ${inq}` : prop;

                const docRef = doc(db, "cocheras_edificio", "UF-" + ufID);
                batch.set(docRef, {
                    uf: ufID,
                    cochera: nCochera,
                    prop: nombreFull,
                    patente: "",
                    auto: ""
                }, { merge: true });

                total++;
                if(total % 400 === 0) { 
                    await batch.commit(); 
                    batch = writeBatch(db); 
                }
            }

            await batch.commit();
            alert("¡Éxito! Se cargaron " + total + " registros.");
        };
        reader.readAsText(file, "ISO-8859-1");
    };

    document.getElementById('buscador').oninput = (e) => {
        const b = e.target.value.toLowerCase();
        let ufNorm = b; if(b && !isNaN(b)) ufNorm = b.padStart(4, '0');

        const filtrados = baseLocal.filter(i => 
            i.uf.includes(ufNorm) || 
            (i.cochera && i.cochera.toLowerCase().includes(b)) ||
            (i.prop && i.prop.toLowerCase().includes(b))
        );
        dibujar(filtrados);
    };

    document.getElementById('btn-borrar').onclick = async () => {
        if(!confirm("¿Borrar todo?")) return;
        const snap = await getDocs(colRef);
        const b = writeBatch(db);
        snap.docs.forEach(d => b.delete(d.ref));
        await b.commit();
        alert("Base borrada");
    };
</script>
</body>
</html>
