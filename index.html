<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>SISTEMA COCHERAS - CARGA FINAL</title>
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; padding: 15px; }
        .box { border: 1px solid #2a3942; padding: 15px; border-radius: 10px; background: #111b21; margin-bottom: 15px; }
        #log { background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 11px; height: 120px; overflow-y: auto; border: 1px solid #333; white-space: pre-wrap; }
        .card { background: #1c272e; padding: 12px; margin-top: 8px; border-radius: 8px; border-left: 5px solid #1d6ed7; border-bottom: 1px solid #2a3942; }
        .input-file { background: #1d6ed7; color: white; padding: 15px; width: 100%; border-radius: 8px; box-sizing: border-box; cursor: pointer; border: none; font-weight: bold; }
        .btn-borrar { background: #e91e63; color: white; padding: 8px; width: 100%; border: none; margin-top: 10px; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .uf-label { color: #f59e0b; font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="box">
    <label style="display:block; margin-bottom:10px; color:#8696a0;">SELECCIONE SU ARCHIVO CSV:</label>
    <input type="file" id="archivo-real" class="input-file">
    <div id="log">Estado: Esperando...</div>
</div>

<div id="lista"></div>

<div class="box">
    <button class="btn-borrar" id="btn-borrar">LIMPIAR TODA LA BASE DE DATOS</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");

    const logger = (m) => {
        const l = document.getElementById('log');
        l.innerText += "\n> " + m;
        l.scrollTop = l.scrollHeight;
    };

    // Escuchar cambios y dibujar tarjetas
    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        const contenedor = document.getElementById('lista');
        if (snap.empty) {
            contenedor.innerHTML = "<p style='text-align:center;color:#555;'>No hay datos cargados.</p>";
            return;
        }
        contenedor.innerHTML = snap.docs.map(d => {
            const i = d.data();
            return `
                <div class="card">
                    <span class="uf-label">UF ${i.uf}</span> | Cochera: ${i.cochera}<br>
                    <small style="color:#aaa;">Propietario/Inq:</small> ${i.prop || 'S/D'}
                </div>`;
        }).join('');
    });

    const input = document.getElementById('archivo-real');
    
    input.addEventListener('change', function() {
        if (!this.files || !this.files) return;

        logger("Archivo capturado. Leyendo contenido...");

        const lector = new FileReader();
        lector.onload = async (e) => {
            try {
                const contenido = e.target.result;
                // Separar por cualquier tipo de salto de línea (Windows/Mac/Linux)
                const filas = contenido.split(/\r\n|\n|\r/).filter(f => f.trim().length > 0);
                
                logger("Filas detectadas: " + filas.length);

                let batch = writeBatch(db);
                let count = 0;

                // Empezamos en 1 para saltar el encabezado UF;cochera...
                for (let i = 1; i < filas.length; i++) {
                    const columnas = filas[i].split(';');
                    
                    // Limpieza total de comillas y espacios
                    const ufLimpia = columnas ? columnas.replace(/["']/g, "").trim() : "";
                    
                    if (!ufLimpia || isNaN(parseInt(ufLimpia))) continue;

                    const ufID = ufLimpia.padStart(4, '0');
                    const nCochera = (columnas && columnas.trim() !== "") ? columnas.replace(/["']/g, "").trim() : ufLimpia;
                    const prop = (columnas) ? columnas.replace(/["']/g, "").trim() : "S/D";
                    const inq = (columnas) ? columnas.replace(/["']/g, "").trim() : "";
                    
                    const nombreFinal = inq ? prop + " / " + inq : prop;

                    const docRef = doc(db, "cocheras_edificio", "UF-" + ufID);
                    batch.set(docRef, {
                        uf: ufID,
                        cochera: nCochera,
                        prop: nombreFinal,
                        patente: ""
                    }, { merge: true });

                    count++;

                    // Firebase permite máximo 500 operaciones por batch
                    if (count % 450 === 0) {
                        await batch.commit();
                        batch = writeBatch(db);
                        logger("Guardando bloque...");
                    }
                }

                await batch.commit();
                logger("¡PROCESO COMPLETADO! " + count + " registros subidos.");
            } catch (err) {
                logger("ERROR INTERNO: " + err.message);
                console.error(err);
            }
        };

        // Importante: ISO-8859-1 para que no se rompa con los acentos de los nombres
        lector.readAsText(this.files, "ISO-8859-1");
    });

    document.getElementById('btn-borrar').onclick = async () => {
        if(!confirm("¿Borrar todos los datos de la nube?")) return;
        try {
            const snap = await getDocs(colRef);
            const b = writeBatch(db);
            snap.docs.forEach(d => b.delete(d.ref));
            await b.commit();
            logger("Base de datos borrada.");
        } catch (e) {
            logger("Error al borrar: " + e.message);
        }
    };
</script>
</body>
</html>
