<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>TEST COCHERAS</title>
    <style>
        :root { --bg: #0b141a; --panel: #111b21; --card: #1c272e; --border: #2a3942; --text: #e9edef; --blue: #1d6ed7; --yellow: #f59e0b; }
        body { margin: 0; background: var(--bg); font-family: sans-serif; color: var(--text); padding: 10px; }
        .panel { background: var(--panel); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; text-align: center; }
        .btn { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; font-size: 16px; }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-red { background: #e91e63; color: #fff; }
        .card { background: var(--card); border-radius: 10px; padding: 15px; margin-bottom: 10px; border-left: 5px solid var(--yellow); }
        .status { font-size: 12px; color: var(--yellow); margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="panel">
    <h3>PASO 1: LIMPIAR</h3>
    <button class="btn btn-red" id="btn-borrar">BORRAR BASE ACTUAL</button>
    <hr>
    <h3>PASO 2: CARGAR PRUEBA</h3>
    <div id="status-msg" class="status">Estado: Listo para probar</div>
    <button class="btn btn-blue" onclick="document.getElementById('csv-file').click()">SELECCIONAR PRUEBA.CSV</button>
    <input type="file" id="csv-file" accept=".csv" style="display:none">
</div>

<div id="lista"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, getDocs, writeBatch, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");

    // Mostrar datos
    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        const cont = document.getElementById('lista');
        const docs = snap.docs.map(d => d.data());
        document.getElementById('status-msg').innerText = `Documentos en la nube: ${docs.length}`;
        
        cont.innerHTML = docs.map(i => `
            <div class="card">
                <b>UF: ${i.uf} (Cochera: ${i.cochera})</b><br>
                <span>${i.prop}</span>
            </div>
        `).join('');
    });

    // Proceso de carga
    document.getElementById('csv-file').onchange = (e) => {
        const file = e.target.files;
        if(!file) return;

        const reader = new FileReader();
        reader.onload = async (ev) => {
            try {
                const text = ev.target.result;
                const lines = text.split(/\r?\n/).filter(l => l.trim());
                alert("Archivo leído. Líneas encontradas: " + lines.length);

                let batch = writeBatch(db);
                let procesados = 0;

                for(let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(';'); // Usamos punto y coma del ejemplo
                    if(cols.length < 3) continue;

                    const uf = cols.trim().padStart(4, '0');
                    const cochera = cols.trim();
                    const prop = cols.trim();
                    const inq = cols ? cols.trim() : "";
                    const nombre = inq ? `${prop} / ${inq}` : prop;

                    const ref = doc(db, "cocheras_edificio", "UF-" + uf);
                    batch.set(ref, { uf, cochera, prop: nombre, patente: "" }, { merge: true });
                    procesados++;
                }

                await batch.commit();
                alert("¡EXITO! Se enviaron " + procesados + " filas a Firebase.");
            } catch (err) {
                alert("ERROR: " + err.message);
            }
        };
        reader.readAsText(file, "ISO-8859-1");
    };

    document.getElementById('btn-borrar').onclick = async () => {
        if(!confirm("¿Borrar todo?")) return;
        const s = await getDocs(colRef);
        const b = writeBatch(db);
        s.docs.forEach(d => b.delete(d.ref));
        await b.commit();
        alert("Base borrada");
    };
</script>
</body>
</html>
