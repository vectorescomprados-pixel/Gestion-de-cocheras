<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA COCHERAS - CARGA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .input-dark { background-color: #1e293b; border: 1px solid #334155; color: white; }
        .input-mirror { background-color: #0f172a; border: 1px solid #1e293b; color: #64748b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [inquilino, setInquilino] = useState('');
            const [monto, setMonto] = useState('');

            useEffect(() => {
                lucide.createIcons();
            }, []);

            // FUNCIÓN DE LA CASITA: Ahora sí te redirige al Hub
            const irAlHub = () => {
                window.location.href = 'index.html'; // O la URL de tu menú principal
            };

            return (
                <div className="max-w-2xl mx-auto p-6">
                    {/* HEADER ORIGINAL */}
                    <div className="flex items-center justify-between mb-8 border-b border-slate-700 pb-4">
                        <button 
                            onClick={irAlHub}
                            className="p-2 hover:bg-slate-800 rounded-lg transition-colors border border-slate-600"
                        >
                            <i data-lucide="home" className="text-blue-400"></i>
                        </button>
                        <h1 className="text-xl font-bold tracking-widest uppercase">Sistema Cocheras - Carga</h1>
                        <div className="w-10"></div>
                    </div>

                    <div className="space-y-6">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            
                            {/* CAMPO 1: INQUILINO (Manual) */}
                            <div className="flex flex-col gap-2">
                                <label className="text-xs font-semibold text-slate-400 uppercase">Inquilino</label>
                                <input 
                                    type="text" 
                                    value={inquilino}
                                    onChange={(e) => setInquilino(e.target.value)}
                                    placeholder="Nombre del inquilino..."
                                    className="input-dark p-4 rounded-lg outline-none focus:border-blue-500"
                                />
                            </div>

                            {/* CAMPO 2: INQUILINO (Espejo - Reemplaza a Cochera) */}
                            <div className="flex flex-col gap-2">
                                <label className="text-xs font-semibold text-slate-400 uppercase">Inquilino</label>
                                <input 
                                    type="text" 
                                    value={inquilino} // Sincronizado automáticamente
                                    readOnly 
                                    placeholder="Sincronizado..."
                                    className="input-mirror p-4 rounded-lg outline-none cursor-not-allowed italic"
                                />
                            </div>
                        </div>

                        {/* CAMPO MONTO */}
                        <div className="flex flex-col gap-2">
                            <label className="text-xs font-semibold text-slate-400 uppercase">Monto del Pago</label>
                            <div className="relative">
                                <span className="absolute left-4 top-4 text-slate-500">$</span>
                                <input 
                                    type="number" 
                                    value={monto}
                                    onChange={(e) => setMonto(e.target.value)}
                                    className="input-dark w-full p-4 pl-8 rounded-lg outline-none focus:border-blue-500 font-mono text-lg"
                                    placeholder="0.00"
                                />
                            </div>
                        </div>

                        {/* BOTÓN GUARDAR */}
                        <button className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg shadow-lg transition-all active:scale-[0.98] uppercase tracking-widest mt-4">
                            Guardar Registro
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
