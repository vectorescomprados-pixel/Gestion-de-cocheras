<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA COCHERAS - CARGA VELOZ</title>
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        .header { position: sticky; top: 0; background: #0b141a; padding: 10px 0; z-index: 100; border-bottom: 1px solid #2a3942; }
        .search-box { width: 100%; padding: 12px; background: #202c33; border: 1px solid #2a3942; border-radius: 10px; color: white; font-size: 16px; box-sizing: border-box; }
        #lista { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .card { background: #111b21; padding: 15px; border-radius: 10px; border-left: 5px solid #00a884; }
        .uf-tag { color: #00a884; font-weight: bold; font-size: 0.9em; }
        .nombre { font-size: 1.1em; margin: 5px 0; color: #e9edef; }
        
        .admin-panel { margin-top: 40px; padding: 20px; border: 2px dashed #333; border-radius: 15px; background: #161d22; }
        textarea { width: 100%; height: 100px; background: #000; color: #0f0; border: 1px solid #444; margin: 10px 0; padding: 10px; box-sizing: border-box; font-family: monospace; }
        .btn { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; font-size: 14px; text-transform: uppercase; }
        .btn-red { background: #ff3b30; color: white; }
        .btn-green { background: #00a884; color: white; }
        #status { font-size: 13px; color: #00a884; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0 0 10px 0;">Cocheras Edificio</h3>
    <input type="text" id="buscador" class="search-box" placeholder="🔎 Buscar UF o Nombre...">
</div>

<div id="lista"></div>

<div class="admin-panel">
    <h4 style="margin:0;">⚙️ PANEL DE CARGA</h4>
    <button class="btn btn-red" onclick="window.borrarTodo()">1. LIMPIAR NUBE</button>
    <textarea id="csv-input" placeholder="Pegue aquí el contenido del CSV..."></textarea>
    <button class="btn btn-green" onclick="window.cargarDatos()">2. CARGAR TODO AHORA</button>
    <div id="status">Estado: En espera</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, writeBatch, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");

    let datosLocales = [];

    // --- ESCUCHA TIEMPO REAL ---
    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        datosLocales = snap.docs.map(d => d.data());
        renderizar(datosLocales);
    });

    function renderizar(datos) {
        const listado = document.getElementById('lista');
        listado.innerHTML = "";
        datos.forEach(i => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="uf-tag">UF ${i.uf}</div>
                <div class="nombre">${i.prop}</div>
                <div style="color:#8696a0; font-size:0.9em;">Cochera: <b>${i.cochera}</b></div>
            `;
            listado.appendChild(div);
        });
    }

    // --- BUSCADOR ---
    document.getElementById('buscador').oninput = (e) => {
        const t = e.target.value.toLowerCase();
        renderizar(datosLocales.filter(i => i.uf.includes(t) || i.prop.toLowerCase().includes(t)));
    };

    // --- FUNCIONES GLOBALES ---
    
    window.borrarTodo = async () => {
        if(!confirm("¿Borrar todo?")) return;
        document.getElementById('status').innerText = "Vaciando base...";
        const snap = await getDocs(colRef);
        const batch = writeBatch(db);
        snap.forEach(d => batch.delete(d.ref));
        await batch.commit();
        alert("Nube limpia.");
        document.getElementById('status').innerText = "Listo.";
    };

    window.cargarDatos = async () => {
        const input = document.getElementById('csv-input');
        const texto = input.value.trim();
        if(!texto) return alert("Pega los datos del CSV");

        const status = document.getElementById('status');
        const filas = texto.split(/\r?\n/).filter(l => l.includes(','));
        
        status.innerText = "Preparando envío masivo...";
        
        try {
            let batch = writeBatch(db);
            let contador = 0;

            for (let f of filas) {
                if (f.toUpperCase().includes("UF,PROPIETARIO")) continue;
                
                const c = f.split(',');
                let ufNum = String(c || "").replace(/[^0-9]/g, '');
                if(!ufNum) continue;

                const ufID = ufNum.padStart(4, '0');
                const prop = (c || "S/D").trim();
                const inq = (c || "").trim();

                let cocheraFinal = ufNum;
                if(inq) {
                    const partes = inq.split(' ');
                    cocheraFinal = partes[partes.length - 1];
                }

                const docRef = doc(db, "cocheras_edificio", "UF-" + ufID);
                batch.set(docRef, {
                    uf: ufID,
                    prop: inq ? `${prop} / ${inq}` : prop,
                    cochera: cocheraFinal,
                    patente: ""
                }, { merge: true });

                contador++;

                // Firebase permite hasta 500 operaciones por lote. 
                // Como tenemos 278, se enviará TODO de una sola vez.
            }

            status.innerText = "Subiendo datos a la nube...";
            await batch.commit(); // ESTA ES LA MAGIA: Envía todo junto.
            
            alert("¡CARGA EXITOSA! " + contador + " registros actualizados.");
            input.value = "";
            status.innerText = "Sincronizado.";

        } catch (e) {
            alert("Error: " + e.message);
            status.innerText = "Error en la carga.";
        }
    };
</script>
</body>
</html>
