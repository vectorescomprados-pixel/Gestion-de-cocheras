<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>SISTEMA COCHERAS PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --panel: #111b21; --card: #1c272e; --border: #2a3942; --text: #e9edef; --blue: #1d6ed7; --yellow: #f59e0b; --red: #e91e63; }
        body { margin: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: var(--text); padding: 10px; }
        
        .panel { background: var(--panel); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        
        .btn { height: 45px; border-radius: 8px; border: none; font-size: 10px; font-weight: bold; text-transform: uppercase; cursor: pointer; color: #fff; transition: 0.2s; }
        .btn-yellow { background: var(--yellow); color: #000; }
        .btn-red { background: var(--red); }
        .btn-grey { background: #4b5563; }
        
        input { width: 100%; padding: 14px; margin-top: 12px; background: #1a242b; border: 1px solid var(--border); color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: var(--blue); }

        .progress-container { width: 100%; height: 26px; background: #000; border-radius: 8px; margin-top: 12px; display: none; overflow: hidden; border: 2px solid var(--yellow); position: relative; }
        #progress-bar { width: 0%; height: 100%; background: var(--yellow); transition: width 0.1s; }
        #progress-text { position: absolute; inset: 0; display: grid; place-items: center; color: #000; font-weight: bold; font-size: 11px; z-index: 2; }

        /* Estilo Tarjeta Columnas */
        .card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 12px; margin-bottom: 10px; border-left: 6px solid var(--blue); }
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 8px; }
        .uf-tag { font-size: 18px; font-weight: 900; color: var(--blue); }
        .cochera-tag { background: var(--blue); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        
        .data-row { display: grid; grid-template-columns: 80px 1fr; gap: 5px; font-size: 13px; margin-bottom: 4px; }
        .label { color: #8696a0; font-weight: bold; }
        .val { color: var(--text); }
        .patente-box { margin-top: 8px; background: #000; padding: 5px 10px; border-radius: 5px; color: var(--yellow); font-family: monospace; font-weight: bold; font-size: 14px; text-align: center; border: 1px dashed var(--yellow); }
    </style>
</head>
<body>

<div class="panel">
    <div class="row">
        <button class="btn btn-yellow" onclick="document.getElementById('csv-file').click()"><i class="fas fa-file-import"></i> CSV</button>
        <button class="btn btn-red" id="btn-borrar">BORRAR</button>
        <button class="btn btn-grey" onclick="location.reload()">RECARGAR</button>
    </div>
    
    <div class="progress-container" id="p-container">
        <div id="progress-text">ESPERANDO...</div>
        <div id="progress-bar"></div>
    </div>
    
    <input type="file" id="csv-file" accept=".csv" style="display:none">
    <input type="text" id="buscador" placeholder="Buscar UF, Cochera o Nombre...">
</div>

<div id="lista-container"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, getDocs, writeBatch, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");
    let baseLocal = [];

    // --- ESCUCHA EN TIEMPO REAL ---
    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        baseLocal = snap.docs.map(d => d.data());
        render(baseLocal);
    });

    function render(datos) {
        const cont = document.getElementById('lista-container');
        if (datos.length === 0) {
            cont.innerHTML = '<div style="text-align:center; padding:20px; color:#8696a0">Sin datos. Sube el CSV.</div>';
            return;
        }
        cont.innerHTML = datos.map(i => `
            <div class="card">
                <div class="card-header">
                    <span class="uf-tag">UF ${i.uf}</span>
                    <span class="cochera-tag">COCHERA: ${i.cochera || 'S/N'}</span>
                </div>
                <div class="data-row"><span class="label">TITULAR:</span><span class="val">${i.prop || '---'}</span></div>
                <div class="patente-box">${i.patente || 'SIN PATENTE CARGADA'}</div>
            </div>
        `).join('');
    }

    // --- IMPORTACIÓN ADAPTADA AL ARCHIVO ---
    document.getElementById('csv-file').onchange = (e) => {
        const file = e.target.files;
        if(!file) return;

        const reader = new FileReader();
        const pCont = document.getElementById('p-container');
        const pBar = document.getElementById('progress-bar');
        const pText = document.getElementById('progress-text');

        pCont.style.display = 'block';

        reader.onload = async (ev) => {
            const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim());
            let batch = writeBatch(db);
            let count = 0;

            for(let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(';'); // SEPARADOR PUNTO Y COMA
                
                let ufRaw = cols?.trim();
                if(!ufRaw || isNaN(parseInt(ufRaw))) continue;

                const ufId = ufRaw.padStart(4, '0');
                const nCochera = cols?.trim() || ""; // Columna Cochera
                const prop = cols?.trim() || "";      // Columna Propietario
                const inq = cols?.trim() || "";       // Columna Inquilino
                
                const nombreStr = inq ? `${prop} / ${inq}` : prop;

                const ref = doc(db, "cocheras_edificio", "UF-" + ufId);
                batch.set(ref, {
                    uf: ufId,
                    cochera: nCochera,
                    prop: nombreStr,
                    patente: "",
                    auto: ""
                }, { merge: true });

                count++;
                if(count % 400 === 0) { await batch.commit(); batch = writeBatch(db); }

                let p = Math.round((i / (lines.length - 1)) * 100);
                pBar.style.width = p + "%";
                pText.innerText = `IMPORTANDO: ${p}%`;
            }
            await batch.commit();
            pCont.style.display = 'none';
            alert("Sincronización Exitosa: " + count + " registros.");
        };
        reader.readAsText(file, "ISO-8859-1");
    };

    // --- BUSCADOR TRIPLE (UF, COCHERA O NOMBRE) ---
    document.getElementById('buscador').oninput = (e) => {
        const v = e.target.value.toLowerCase();
        let ufNorm = v; if(v && !isNaN(v)) ufNorm = v.padStart(4, '0');

        const filtrados = baseLocal.filter(i => 
            i.uf.includes(ufNorm) || 
            (i.cochera && i.cochera.toLowerCase().includes(v)) ||
            (i.prop && i.prop.toLowerCase().includes(v))
        );
        render(filtrados);
    };

    // --- BORRAR TODO ---
    document.getElementById('btn-borrar').onclick = async () => {
        if(!confirm("¿Borrar base de datos?")) return;
        const snap = await getDocs(colRef);
        const b = writeBatch(db);
        snap.docs.forEach(d => b.delete(d.ref));
        await b.commit();
    };
</script>
</body>
</html>
