<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA COCHERAS - LISTADO</title>
    <style>
        body { background: #0b141a; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 15px; margin: 0; }
        .header { position: sticky; top: 0; background: #0b141a; padding-bottom: 15px; z-index: 100; }
        
        /* Buscador */
        .search-box { 
            width: 100%; 
            padding: 12px 15px; 
            background: #202c33; 
            border: 1px solid #2a3942; 
            border-radius: 10px; 
            color: white; 
            font-size: 16px; 
            box-sizing: border-box;
            outline: none;
        }
        .search-box:focus { border-color: #00a884; }

        /* Contenedor de Tarjetas - Ahora en columna */
        #lista { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            margin-top: 10px;
        }

        /* Diseño de cada Registro */
        .card { 
            background: #111b21; 
            padding: 15px; 
            border-radius: 8px; 
            border-left: 4px solid #00a884; /* Verde tipo WhatsApp */
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .uf-num { font-weight: bold; color: #00a884; font-size: 1.1em; }
        .prop-name { color: #e9edef; font-size: 1em; }
        .cochera-info { color: #8696a0; font-size: 0.9em; }

        .no-results { text-align: center; color: #8696a0; margin-top: 50px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin: 10px 0;">Cocheras Edificio</h2>
    <input type="text" id="buscador" class="search-box" placeholder="Buscar por UF o Nombre...">
</div>

<div id="lista">
    <p style="text-align:center; color:#8696a0;">Cargando datos...</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");

    let todosLosDatos = [];

    // 1. Escuchar datos de Firebase
    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        todosLosDatos = snap.docs.map(d => d.data());
        renderizar(todosLosDatos);
    });

    // 2. Función para dibujar las tarjetas
    function renderizar(datos) {
        const contenedor = document.getElementById('lista');
        
        if (datos.length === 0) {
            contenedor.innerHTML = '<div class="no-results">No se encontraron registros.</div>';
            return;
        }

        contenedor.innerHTML = datos.map(i => `
            <div class="card">
                <div class="uf-num">UF ${i.uf}</div>
                <div class="prop-name">${i.prop}</div>
                <div class="cochera-info">Cochera asignada: ${i.cochera}</div>
            </div>
        `).join('');
    }

    // 3. Lógica del Buscador
    document.getElementById('buscador').addEventListener('input', (e) => {
        const busqueda = e.target.value.toLowerCase();
        const filtrados = todosLosDatos.filter(i => {
            return i.uf.includes(busqueda) || i.prop.toLowerCase().includes(busqueda);
        });
        renderizar(filtrados);
    });

</script>
</body>
</html>
