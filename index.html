<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA COCHERAS - SIN DUPLICADOS</title>
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        .header { position: sticky; top: 0; background: #0b141a; padding: 10px 0; z-index: 100; border-bottom: 1px solid #2a3942; }
        .search-box { width: 100%; padding: 12px; background: #202c33; border: 1px solid #2a3942; border-radius: 8px; color: white; font-size: 16px; box-sizing: border-box; }
        #lista { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .card { background: #111b21; padding: 15px; border-radius: 10px; border-left: 5px solid #00a884; position: relative; }
        .uf-tag { color: #00a884; font-weight: bold; font-size: 0.9em; }
        .nombre { font-size: 1.1em; margin: 5px 0; color: #e9edef; }
        .admin-panel { margin-top: 40px; padding: 15px; border: 1px solid #333; border-radius: 10px; background: #161d22; }
        textarea { width: 100%; height: 100px; background: #000; color: #0f0; border: 1px solid #444; margin: 10px 0; font-family: monospace; padding: 10px; box-sizing: border-box; }
        .btn { padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        .btn-red { background: #e91e63; color: white; }
        .btn-green { background: #00a884; color: white; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0;">Cocheras Edificio</h3>
    <input type="text" id="buscador" class="search-box" placeholder="Buscar UF o Nombre...">
</div>

<div id="lista"></div>

<div class="admin-panel">
    <h4 style="margin:0;">Panel de Control</h4>
    <button class="btn btn-red" id="btn-borrar">BORRAR TODO (LIMPIEZA INICIAL)</button>
    <textarea id="csv-input" placeholder="Pegue aquí el contenido del CSV..."></textarea>
    <button class="btn btn-green" id="btn-cargar">CARGAR / ACTUALIZAR DATOS</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, writeBatch, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");

    let datosLocales = [];

    // --- RENDERIZADO ---
    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        const listado = document.getElementById('lista');
        listado.innerHTML = ""; 
        datosLocales = [];

        snap.forEach(doc => {
            const i = doc.data();
            datosLocales.push(i);
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="uf-tag">UF ${i.uf}</div>
                <div class="nombre">${i.prop}</div>
                <div style="color:#8696a0; font-size:0.9em;">Cochera: ${i.cochera}</div>
            `;
            listado.appendChild(div);
        });
    });

    // --- BUSCADOR ---
    document.getElementById('buscador').oninput = (e) => {
        const term = e.target.value.toLowerCase();
        const filtrados = datosLocales.filter(i => i.uf.includes(term) || i.prop.toLowerCase().includes(term));
        const listado = document.getElementById('lista');
        listado.innerHTML = "";
        filtrados.forEach(i => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<div class="uf-tag">UF ${i.uf}</div><div class="nombre">${i.prop}</div><div style="color:#8696a0; font-size:0.9em;">Cochera: ${i.cochera}</div>`;
            listado.appendChild(div);
        });
    };

    // --- BORRADO FÍSICO ---
    document.getElementById('btn-borrar').onclick = async () => {
        if(!confirm("¿Borrar todo?")) return;
        const snap = await getDocs(colRef);
        const batch = writeBatch(db);
        snap.forEach(d => batch.delete(d.ref));
        await batch.commit();
        alert("Base de datos vaciada.");
    };

    // --- CARGA INTELIGENTE ---
    document.getElementById('btn-cargar').onclick = async () => {
        const texto = document.getElementById('csv-input').value.trim();
        if(!texto) return;

        const filas = texto.split(/\r?\n/).filter(l => l.includes(','));
        let batch = writeBatch(db);
        let contador = 0;

        for (let f of filas) {
            if (f.toUpperCase().includes("UF,PROPIETARIO")) continue;
            const c = f.split(',');
            
            // Limpiamos la UF de cualquier espacio o caracter extraño
            let ufLimpia = String(c || "").replace(/[^0-9]/g, '');
            if(!ufLimpia) continue;

            const ufID = ufLimpia.padStart(4, '0'); // Formato "0001"
            const prop = (c || "S/D").trim();
            const inq = (c || "").trim();

            let cocheraFinal = ufLimpia;
            if(inq) {
                const partes = inq.split(' ');
                cocheraFinal = partes[partes.length - 1];
            }

            // IMPORTANTE: El ID del documento es "UF-" + ufID (ej: UF-0001)
            // Si ya existe uno con ese ID, Firebase lo REEMPLAZA en lugar de duplicar
            const docRef = doc(db, "cocheras_edificio", "UF-" + ufID);
            
            batch.set(docRef, {
                uf: ufID,
                prop: inq ? `${prop} / ${inq}` : prop,
                cochera: cocheraFinal,
                patente: ""
            }, { merge: true });

            contador++;
            if (contador % 400 === 0) { await batch.commit(); batch = writeBatch(db); }
        }

        await batch.commit();
        alert("¡Carga finalizada! Registros procesados: " + contador);
        document.getElementById('csv-input').value = "";
    };
</script>
</body>
</html>
