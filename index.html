<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>SISTEMA COCHERAS - MOTOR GESTION UF</title>
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .box { border: 2px solid #2a3942; padding: 20px; border-radius: 10px; background: #111b21; max-width: 450px; margin: auto; }
        #log { background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 11px; height: 150px; overflow-y: auto; border: 1px solid #333; margin-top: 15px; text-align: left; white-space: pre-wrap; }
        .btn-import { background: #25d366; color: black; padding: 15px; width: 100%; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; margin-bottom: 10px; }
        .card { background: #1c272e; padding: 12px; margin-top: 10px; border-radius: 8px; text-align: left; border-left: 5px solid #25d366; }
        input[type="file"] { margin-bottom: 15px; color: #8696a0; }
    </style>
</head>
<body>

<div class="box">
    <h3>IMPORTAR DESDE RESPALDO_UF</h3>
    <input type="file" id="archivo-input" accept=".csv">
    <button class="btn-import" onclick="ejecutarImportacion()">SUBIR A FIREBASE</button>
    <div id="log">Estado: Esperando archivo de Gestion UF...</div>
</div>

<div id="lista" style="max-width:450px; margin: 20px auto;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");

    window.logger = (m) => {
        const l = document.getElementById('log');
        l.innerText += "\n> " + m;
        l.scrollTop = l.scrollHeight;
    };

    // Monitor de datos
    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        document.getElementById('lista').innerHTML = snap.docs.map(d => {
            const i = d.data();
            return `<div class="card"><b>UF ${i.uf}</b> (Cochera ${i.cochera})<br>${i.prop}</div>`;
        }).join('');
    });

    window.ejecutarImportacion = function() {
        const input = document.getElementById('archivo-input');
        if (!input.files) {
            alert("Selecciona el archivo primero");
            return;
        }

        window.logger("Iniciando lectura de " + input.files.name);
        const reader = new FileReader();

        reader.onload = async function(e) {
            try {
                const contenido = e.target.result;
                // Separamos por líneas
                const lineas = contenido.split(/\r?\n/).filter(l => l.trim() !== "");
                window.logger("Líneas encontradas: " + lineas.length);

                let batch = writeBatch(db);
                let contador = 0;

                // Empezamos en 1 para saltar: UF,Propietario,TelProp,Inquilino,TelInq
                for (let i = 1; i < lineas.length; i++) {
                    const fila = lineas[i];
                    // El respaldo usa comas (,)
                    const c = fila.split(',');

                    if (c.length < 2) continue;

                    // Limpiar UF (quitar espacios o comillas)
                    const ufRaw = c.replace(/[^0-9]/g, '');
                    if (!ufRaw) continue;

                    const ufID = ufRaw.padStart(4, '0');
                    const propietario = c ? c.trim() : "S/D";
                    const inquilino = c ? c.trim() : "";
                    
                    // Armamos el nombre combinado
                    const nombreMostrar = inquilino ? `${propietario} / ${inquilino}` : propietario;

                    const ref = doc(db, "cocheras_edificio", "UF-" + ufID);
                    batch.set(ref, {
                        uf: ufID,
                        cochera: ufRaw, // Por defecto, cochera = UF
                        prop: nombreMostrar,
                        patente: "",
                        auto: ""
                    }, { merge: true });

                    contador++;

                    // Commit cada 450 para no saturar Firebase
                    if (contador % 450 === 0) {
                        await batch.commit();
                        batch = writeBatch(db);
                        window.logger("Guardando bloque...");
                    }
                }

                await batch.commit();
                window.logger("¡IMPORTACIÓN EXITOSA! " + contador + " registros.");

            } catch (err) {
                window.logger("ERROR: " + err.message);
                console.error(err);
            }
        };

        // Leemos con la misma codificación que genera el backup
        reader.readAsText(input.files, "UTF-8");
    };
</script>
</body>
</html>
