<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>SISTEMA COCHERAS - CARGA FORZADA V2</title>
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .box { border: 2px solid #2a3942; padding: 20px; border-radius: 10px; background: #111b21; max-width: 450px; margin: auto; }
        #log { background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 11px; height: 150px; overflow-y: auto; border: 1px solid #333; margin-top: 15px; text-align: left; white-space: pre-wrap; }
        .btn-import { background: #1d6ed7; color: white; padding: 15px; width: 100%; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .card { background: #1c272e; padding: 12px; margin-top: 10px; border-radius: 8px; text-align: left; border-left: 5px solid #1d6ed7; }
    </style>
</head>
<body>

<div class="box">
    <h3>PASO 1: Seleccionar Archivo</h3>
    <input type="file" id="archivo-input">
    
    <h3 style="margin-top:20px;">PASO 2: Confirmar Carga</h3>
    <button class="btn-import" onclick="forzarLectura()">PROCESAR AHORA</button>
    
    <div id="log">Estado: Esperando archivo...</div>
</div>

<div id="lista" style="max-width:450px; margin: 20px auto;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");

    window.logger = (m) => {
        const l = document.getElementById('log');
        l.innerText += "\n> " + m;
        l.scrollTop = l.scrollHeight;
    };

    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        document.getElementById('lista').innerHTML = snap.docs.map(d => {
            const i = d.data();
            return `<div class="card"><b>UF ${i.uf}</b> - ${i.prop}</div>`;
        }).join('');
    });

    window.forzarLectura = function() {
        const input = document.getElementById('archivo-input');
        
        // NO validamos el nombre, solo si existe el objeto en el índice 0
        if (!input.files || !input.files) {
            alert("Selecciona el archivo primero");
            return;
        }

        const miArchivo = input.files;
        window.logger("Iniciando bypass de seguridad...");

        const reader = new FileReader();

        reader.onload = async function(e) {
            try {
                const texto = e.target.result;
                if (!texto) {
                    window.logger("ERROR: El archivo no entregó datos.");
                    return;
                }

                // Basado en tu archivo "Respaldo_UF (1).csv" que usa COMAS
                const filas = texto.split(/\r?\n/).filter(l => l.includes(','));
                window.logger("ÉXITO: Se leyeron " + filas.length + " filas.");

                let batch = writeBatch(db);
                let contador = 0;

                for (let i = 1; i < filas.length; i++) {
                    const c = filas[i].split(',');
                    const ufRaw = c.replace(/[^0-9]/g, '');
                    if (!ufRaw) continue;

                    const ufID = ufRaw.padStart(4, '0');
                    const prop = c ? c.trim() : "S/D";
                    const inq = c ? c.trim() : "";
                    
                    const ref = doc(db, "cocheras_edificio", "UF-" + ufID);
                    batch.set(ref, {
                        uf: ufID,
                        cochera: ufRaw,
                        prop: inq ? `${prop} / ${inq}` : prop,
                        patente: ""
                    }, { merge: true });

                    contador++;
                    if (contador % 400 === 0) {
                        await batch.commit();
                        batch = writeBatch(db);
                    }
                }

                await batch.commit();
                window.logger("¡CARGA FINALIZADA! " + contador + " registros.");

            } catch (err) {
                window.logger("Fallo crítico: " + err.message);
            }
        };

        // Si el archivo viene de "Gestion UF", lo leemos como texto simple
        reader.readAsText(miArchivo);
    };
</script>
</body>
</html>
