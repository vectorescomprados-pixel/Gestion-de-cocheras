<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>DIAGNÓSTICO COCHERAS</title>
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; padding: 20px; }
        .box { border: 1px solid #2a3942; padding: 15px; border-radius: 10px; margin-bottom: 20px; background: #111b21; }
        button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-blue { background: #1d6ed7; color: white; }
        .btn-red { background: #e91e63; color: white; }
        #log { background: black; color: #00ff00; padding: 10px; font-family: monospace; font-size: 12px; height: 150px; overflow-y: scroll; border: 1px solid #333; }
        .card { background: #1c272e; padding: 10px; margin-top: 10px; border-radius: 5px; border-left: 4px solid #f59e0b; }
    </style>
</head>
<body>

<div class="box">
    <h3>Consola de Estado</h3>
    <div id="log">Esperando acción...</div>
</div>

<div class="box">
    <button class="btn-red" id="btn-borrar">1. BORRAR TODA LA BASE</button>
    <button class="btn-blue" onclick="document.getElementById('csv-input').click()">2. SUBIR PRUEBA.CSV</button>
    <input type="file" id="csv-input" accept=".csv" style="display:none">
</div>

<div id="resultado"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");

    const logger = (msg) => {
        const l = document.getElementById('log');
        l.innerHTML += `<br>> ${msg}`;
        l.scrollTop = l.scrollHeight;
    };

    // Escuchar cambios
    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        logger(`Firebase actualizado: ${snap.size} documentos encontrados.`);
        const res = document.getElementById('resultado');
        res.innerHTML = snap.docs.map(d => {
            const i = d.data();
            return `<div class="card">UF: ${i.uf} | Cochera: ${i.cochera}<br>Prop: ${i.prop}</div>`;
        }).join('');
    });

    // Borrar
    document.getElementById('btn-borrar').onclick = async () => {
        logger("Iniciando borrado...");
        try {
            const snap = await getDocs(colRef);
            const batch = writeBatch(db);
            snap.docs.forEach(d => batch.delete(d.ref));
            await batch.commit();
            logger("Base de datos borrada con éxito.");
        } catch (e) { logger("ERROR AL BORRAR: " + e.message); }
    };

    // Leer CSV
    document.getElementById('csv-input').onchange = (e) => {
        const file = e.target.files;
        if (!file) return;
        logger(`Archivo seleccionado: ${file.name}`);

        const reader = new FileReader();
        reader.onload = async (ev) => {
            try {
                const texto = ev.target.result;
                const lineas = texto.split(/\r?\n/).filter(l => l.trim());
                logger(`Lineas leídas: ${lineas.length}`);

                const batch = writeBatch(db);
                let contador = 0;

                for (let i = 1; i < lineas.length; i++) {
                    const columnas = lineas[i].split(';');
                    if (columnas.length < 2) continue;

                    const uf = columnas.trim().padStart(4, '0');
                    const cochera = columnas.trim() || uf;
                    const prop = columnas?.trim() || "S/D";
                    
                    const ref = doc(db, "cocheras_edificio", "UF-" + uf);
                    batch.set(ref, { uf, cochera, prop, patente: "" }, { merge: true });
                    contador++;
                }

                logger(`Enviando ${contador} registros a Firebase...`);
                await batch.commit();
                logger("¡Sincronización completada con éxito!");
            } catch (err) {
                logger("ERROR EN PROCESO: " + err.message);
                console.error(err);
            }
        };
        reader.onerror = () => logger("Error al leer el archivo físico.");
        reader.readAsText(file, "ISO-8859-1");
    };
</script>
</body>
</html>
