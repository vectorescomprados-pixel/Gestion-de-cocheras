<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Carga - Inquilinos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [inquilino, setInquilino] = useState('');
            const [monto, setMonto] = useState('');

            // Función para volver al HUB (Simulado)
            const irAlHub = () => {
                // Aquí podrías usar window.location.href = '/' si fuera una web real
                alert("Redirigiendo al Hub Central...");
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col p-4">
                    
                    {/* Header con el botón de la casita igual a tus otras apps */}
                    <header className="flex items-center justify-between mb-8 pt-4">
                        <button 
                            onClick={irAlHub}
                            className="p-3 bg-white rounded-2xl shadow-sm hover:bg-gray-50 active:scale-90 transition-all text-blue-500"
                        >
                            <i data-lucide="home"></i>
                        </button>
                        <h1 className="text-xl font-bold text-gray-800">Carga de Datos</h1>
                        <div className="w-12"></div> {/* Balanceador visual */}
                    </header>

                    <div className="space-y-6">
                        {/* Fila de campos duplicados/sincronizados */}
                        <div className="grid grid-cols-2 gap-4">
                            
                            {/* Campo 1: Inquilino (Entrada) */}
                            <div className="flex flex-col gap-2">
                                <label className="text-sm font-bold text-gray-500 ml-1 uppercase flex items-center gap-2">
                                    <i data-lucide="user" size="14"></i> Inquilino
                                </label>
                                <input 
                                    type="text" 
                                    value={inquilino}
                                    onChange={(e) => setInquilino(e.target.value)}
                                    placeholder="Nombre..."
                                    className="w-full p-4 bg-white rounded-2xl shadow-sm border-0 focus:ring-2 focus:ring-blue-400 outline-none"
                                />
                            </div>

                            {/* Campo 2: Inquilino (Espejo - Antes llamado Cochera) */}
                            <div className="flex flex-col gap-2">
                                <label className="text-sm font-bold text-gray-500 ml-1 uppercase flex items-center gap-2">
                                    <i data-lucide="user-check" size="14"></i> Inquilino
                                </label>
                                <input 
                                    type="text" 
                                    value={inquilino} // Sincronizado
                                    readOnly // No se puede editar aquí
                                    className="w-full p-4 bg-gray-50 text-gray-400 rounded-2xl shadow-inner border-0 outline-none cursor-not-allowed"
                                />
                            </div>
                        </div>

                        {/* Campo Monto */}
                        <div className="flex flex-col gap-2">
                            <label className="text-sm font-bold text-gray-500 ml-1 uppercase flex items-center gap-2">
                                <i data-lucide="dollar-sign" size="14"></i> Monto del pago
                            </label>
                            <input 
                                type="number" 
                                value={monto}
                                onChange={(e) => setMonto(e.target.value)}
                                placeholder="0.00"
                                className="w-full p-4 bg-white rounded-2xl shadow-sm border-0 focus:ring-2 focus:ring-blue-400 outline-none"
                            />
                        </div>

                        {/* Botón de Guardar */}
                        <button className="w-full bg-blue-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-600 active:scale-95 transition-all mt-4">
                            GUARDAR CARGA
                        </button>
                    </div>

                    {/* Footer decorativo */}
                    <footer className="mt-auto py-6 text-center text-gray-400 text-xs">
                        Sistema v2.0 - Sincronización activa
                    </footer>
                </div>
            );
        };

        // Renderizar la App e inicializar iconos
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Pequeño delay para que Lucide encuentre los elementos después de que React renderice
        setTimeout(() => {
            lucide.createIcons();
        }, 100);
    </script>
</body>
</html>
