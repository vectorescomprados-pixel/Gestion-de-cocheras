<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>SISTEMA COCHERAS - REPARACIÓN FINAL</title>
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .box { border: 2px solid #2a3942; padding: 20px; border-radius: 10px; background: #111b21; max-width: 400px; margin: auto; }
        #log { background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 11px; height: 100px; overflow-y: auto; border: 1px solid #333; margin-top: 15px; text-align: left; }
        input[type="file"] { background: #1d6ed7; color: white; padding: 15px; width: 100%; border-radius: 8px; border: none; cursor: pointer; }
        .card { background: #1c272e; padding: 10px; margin-top: 10px; border-radius: 8px; text-align: left; border-left: 5px solid #f59e0b; }
    </style>
</head>
<body>

<div class="box">
    <h3>PASO FINAL: CARGAR CSV</h3>
    <input type="file" id="f" />
    <div id="log">Estado: Esperando...</div>
</div>

<div id="lista" style="max-width:400px; margin: 20px auto;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");

    const logger = (m) => { document.getElementById('log').innerText += "\n> " + m; };

    // Mostrar datos cargados
    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        document.getElementById('lista').innerHTML = snap.docs.map(d => {
            const i = d.data();
            return `<div class="card"><b>UF ${i.uf}</b> - Cochera: ${i.cochera}<br>${i.prop}</div>`;
        }).join('');
    });

    document.getElementById('f').onchange = async function(e) {
        const file = e.target.files;
        if (!file) return;

        logger("Iniciando lectura forzada...");

        try {
            // MÉTODO MODERNO: Text Decoder + ArrayBuffer (más estable que FileReader)
            const buffer = await file.arrayBuffer();
            const decoder = new TextDecoder('iso-8859-1'); // Para acentos de Excel
            const texto = decoder.decode(buffer);

            const filas = texto.split(/\r?\n/).filter(linea => linea.includes(';'));
            logger("Filas detectadas: " + filas.length);

            let batch = writeBatch(db);
            let count = 0;

            for (let f of filas) {
                if (f.toUpperCase().startsWith("UF")) continue;

                const c = f.split(';');
                if (c.length < 2) continue;

                const rawUF = c.trim().replace(/"/g, '');
                if (!rawUF || isNaN(parseInt(rawUF))) continue;

                const ufID = rawUF.padStart(4, '0');
                const nCoch = c?.trim() || rawUF;
                const prop = c?.trim() || "S/D";
                const inq = c?.trim() || "";
                
                const ref = doc(db, "cocheras_edificio", "UF-" + ufID);
                batch.set(ref, {
                    uf: ufID,
                    cochera: nCoch,
                    prop: inq ? `${prop} / ${inq}` : prop,
                    patente: ""
                }, { merge: true });

                count++;
                if (count % 400 === 0) { await batch.commit(); batch = writeBatch(db); }
            }

            await batch.commit();
            logger("¡EXITO TOTAL! " + count + " cargados.");

        } catch (err) {
            logger("ERROR: " + err.message);
        }
    };
</script>
</body>
</html>
