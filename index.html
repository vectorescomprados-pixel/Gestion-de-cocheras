<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>SISTEMA COCHERAS - CARGA DIRECTA</title>
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .box { border: 2px solid #2a3942; padding: 20px; border-radius: 10px; background: #111b21; max-width: 500px; margin: auto; }
        #csv-text { width: 100%; height: 100px; background: #000; color: #0f0; border: 1px solid #333; border-radius: 5px; margin-top: 10px; font-family: monospace; font-size: 10px; }
        .btn-import { background: #25d366; color: black; padding: 15px; width: 100%; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }
        #log { background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 11px; height: 100px; overflow-y: auto; border: 1px solid #333; margin-top: 15px; text-align: left; }
        .card { background: #1c272e; padding: 12px; margin-top: 10px; border-radius: 8px; text-align: left; border-left: 5px solid #25d366; }
    </style>
</head>
<body>

<div class="box">
    <h3>IMPORTACIÓN DIRECTA</h3>
    <p style="font-size: 12px; color: #8696a0;">Pega aquí el contenido de tu archivo CSV:</p>
    <textarea id="csv-text" placeholder="UF,Propietario,TelProp..."></textarea>
    
    <button class="btn-import" onclick="procesarPegado()">SINCRONIZAR CON FIREBASE</button>
    
    <div id="log">Estado: Esperando datos...</div>
</div>

<div id="lista" style="max-width:500px; margin: 20px auto;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");

    window.logger = (m) => {
        const l = document.getElementById('log');
        l.innerText += "\n> " + m;
        l.scrollTop = l.scrollHeight;
    };

    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        document.getElementById('lista').innerHTML = snap.docs.map(d => {
            const i = d.data();
            return `<div class="card"><b>UF ${i.uf}</b> - ${i.prop}</div>`;
        }).join('');
    });

    window.procesarPegado = async function() {
        const texto = document.getElementById('csv-text').value;
        if (!texto || texto.length < 10) {
            alert("Primero pega el contenido del archivo CSV");
            return;
        }

        window.logger("Procesando datos pegados...");

        try {
            // Separar por líneas
            const filas = texto.split(/\r?\n/).filter(l => l.includes(','));
            window.logger("Filas detectadas: " + filas.length);

            let batch = writeBatch(db);
            let contador = 0;

            for (let i = 0; i < filas.length; i++) {
                const fila = filas[i];
                if (fila.toUpperCase().startsWith("UF")) continue;

                const c = fila.split(',');
                // Estructura del Respaldo: UF(0), Propietario(1), TelProp(2), Inquilino(3)
                const ufRaw = c.replace(/[^0-9]/g, '');
                if (!ufRaw) continue;

                const ufID = ufRaw.padStart(4, '0');
                const prop = c ? c.trim() : "S/D";
                const inq = c ? c.trim() : "";
                const nombreMostrar = inq ? `${prop} / ${inq}` : prop;

                const ref = doc(db, "cocheras_edificio", "UF-" + ufID);
                batch.set(ref, {
                    uf: ufID,
                    cochera: ufRaw,
                    prop: nombreMostrar,
                    patente: "",
                    auto: ""
                }, { merge: true });

                contador++;

                if (contador % 450 === 0) {
                    await batch.commit();
                    batch = writeBatch(db);
                    window.logger("Guardando bloque...");
                }
            }

            await batch.commit();
            window.logger("¡CARGA EXITOSA! " + contador + " registros sincronizados.");
            document.getElementById('csv-text').value = ""; // Limpiar

        } catch (err) {
            window.logger("ERROR: " + err.message);
        }
    };
</script>
</body>
</html>
