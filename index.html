<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0">
    <title>SISTEMA COCHERAS - FINAL V2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --card: #111b21; --primary: #3b82f6; --text: #e9edef; --border: #222d34; --success: #16a34a; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; scroll-behavior: smooth; }
        
        /* HEADER */
        .header { position: sticky; top: 0; background: var(--bg); padding-bottom: 15px; z-index: 1000; border-bottom: 1px solid var(--border); }
        .search-box { width: 100%; padding: 12px 15px; background: #202c33; border: 1px solid var(--border); border-radius: 10px; color: white; font-size: 16px; outline: none; margin-top: 10px; }
        
        #lista { display: flex; flex-direction: column; gap: 20px; margin-top: 20px; padding-bottom: 100px; }
        
        /* CARDS */
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); border-left: 5px solid var(--primary); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .uf-title { color: var(--primary); font-weight: bold; font-size: 1.25em; margin: 0; }
        .prop-main { color: var(--text); font-size: 1.1em; margin-top: 5px; display: block; }
        .header-icons { display: flex; gap: 18px; font-size: 1.3em; cursor: pointer; }
        .card-body { display: none; margin-top: 15px; border-top: 1px dashed #4b5563; padding-top: 15px; }
        .card.expanded .card-body { display: block; }

        /* BOTONES FLOTANTES */
        .float-btn {
            position: fixed; width: 55px; height: 55px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            cursor: pointer; z-index: 2000; border: 2px solid white; text-decoration: none;
        }
        .btn-rocket { bottom: 90px; right: 20px; background: #f97316; display: none; } /* Oculto al inicio */
        .btn-home { bottom: 20px; right: 20px; background: #2563eb; }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; }
        .modal input { width: 100%; height: 45px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); padding: 0 12px; background: #0b141a; color: white; }
        .hidden { display: none !important; }
        
        /* ESTILOS BOTONES ACCIÓN */
        .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-ui { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px; border-radius: 10px; border: none; font-weight: bold; color: white; text-transform: uppercase; font-size: 0.85em; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin: 10px 0;">Cocheras Edificio (0-87)</h2>
    <input type="text" id="buscador" class="search-box" placeholder="Buscar por UF o Apellido...">
</div>

<div id="lista"></div>

<div id="go-top" class="float-btn btn-rocket" onclick="window.scrollTo(0,0)">
    <i class="fas fa-rocket"></i>
</div>
<a href="https://vectorescomprados-pixel.github.io/Gestion-de-Consorcios/" class="float-btn btn-home">
    <i class="fas fa-home"></i>
</a>

<div id="modal-form" class="modal hidden">
    <div class="modal-content">
        <h3>Editar Registro</h3><br>
        <input id="f-uf" placeholder="UF">
        <input id="f-prop" placeholder="Propietario">
        <input id="f-telp" placeholder="Tel. Propietario">
        <input id="f-inq" placeholder="Inquilino">
        <input id="f-teli" placeholder="Tel. Inquilino">
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button id="btn-save" class="btn-ui" style="flex:1; background:#2563eb">GUARDAR</button>
            <button id="btn-cancel" class="btn-ui" style="flex:1; background:#475569">VOLVER</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "departamentos"); 

    let departamentos = [];
    let editId = null;

    // Sincronización con FILTRO DE RANGO (0 a 87)
    onSnapshot(query(colRef, orderBy("UF", "asc")), (snap) => {
        // Filtramos para que solo entren UFs entre 0 y 87
        departamentos = snap.docs
            .map(d => ({ id: d.id, ...d.data() }))
            .filter(d => {
                const numUF = parseInt(d.UF);
                return numUF >= 0 && numUF <= 87;
            });
        render(departamentos);
    });

    function render(data) {
        const list = document.getElementById("lista");
        list.innerHTML = "";
        data.forEach(d => {
            const card = document.createElement("div");
            card.className = "card";
            card.id = `card-${d.id}`;
            card.innerHTML = `
                <div class="card-header">
                    <div class="uf-info">
                        <h3 class="uf-title">UF: ${d.UF}</h3>
                        <span class="prop-main">${d.Propietario || 'S/D'}</span>
                    </div>
                    <div class="header-icons">
                        <i class="fas fa-eye" style="color:#d1d5db" onclick="window.toggleExpand('${d.id}')"></i>
                        <i class="fas fa-edit" style="color:#3b82f6" onclick="window.editUF('${d.id}')"></i>
                    </div>
                </div>
                <div class="card-body">
                    <p><strong>Prop:</strong> ${d.Propietario || '-'} | <strong>Tel:</strong> ${d.TelefonoPropietario || 'N/C'}</p>
                    <p><strong>Inq:</strong> ${d.Inquilino || '-'} | <strong>Tel:</strong> ${d.TelefonoInquilino || 'N/C'}</p>
                    <div class="card-actions">
                        <a href="tel:${d.TelefonoInquilino || d.TelefonoPropietario}" class="btn-ui" style="background:#2563eb"><i class="fas fa-phone"></i> LLAMAR</a>
                        <a href="https://wa.me/${String(d.TelefonoInquilino || d.TelefonoPropietario).replace(/[^0-9]/g, '')}" target="_blank" class="btn-ui" style="background:#16a34a"><i class="fab fa-whatsapp"></i> CHAT</a>
                    </div>
                </div>
            `;
            list.appendChild(card);
        });
    }

    // Mostrar/Ocultar Cohete según el scroll
    window.onscroll = () => {
        const btn = document.getElementById("go-top");
        btn.style.display = (window.scrollY > 300) ? "flex" : "none";
    };

    window.toggleExpand = (id) => document.getElementById(`card-${id}`).classList.toggle('expanded');

    window.editUF = (id) => {
        const d = departamentos.find(x => x.id === id);
        editId = id;
        document.getElementById("f-uf").value = d.UF;
        document.getElementById("f-prop").value = d.Propietario || "";
        document.getElementById("f-telp").value = d.TelefonoPropietario || "";
        document.getElementById("f-inq").value = d.Inquilino || "";
        document.getElementById("f-teli").value = d.TelefonoInquilino || "";
        document.getElementById("modal-form").classList.remove("hidden");
    };

    document.getElementById("btn-cancel").onclick = () => document.getElementById("modal-form").classList.add("hidden");

    document.getElementById("btn-save").onclick = async () => {
        const newData = {
            UF: document.getElementById("f-uf").value,
            Propietario: document.getElementById("f-prop").value,
            TelefonoPropietario: document.getElementById("f-telp").value,
            Inquilino: document.getElementById("f-inq").value,
            TelefonoInquilino: document.getElementById("f-teli").value
        };
        await updateDoc(doc(db, "departamentos", editId), newData);
        document.getElementById("modal-form").classList.add("hidden");
    };

    document.getElementById('buscador').addEventListener('input', (e) => {
        const v = e.target.value.toLowerCase();
        const res = departamentos.filter(d => d.UF.toLowerCase().includes(v) || (d.Propietario||"").toLowerCase().includes(v));
        render(res);
    });
</script>
</body>
</html>
