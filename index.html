<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SISTEMA COCHERAS - FIX FINAL</title>
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; margin: 20px; }
        textarea { width: 100%; min-height: 150px; background: #111b21; color: #00a884; border: 1px solid #2a3942; padding: 10px; border-radius: 8px; box-sizing: border-box; }
        .row { display: flex; gap: 12px; margin: 15px 0; }
        button { padding: 12px 20px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; flex: 1; text-transform: uppercase; }
        .danger { background: #ff3b30; color: white; }
        .primary { background: #00a884; color: white; }
        #status { color: #e1ff00; font-weight: bold; margin-bottom: 10px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #111b21; font-size: 14px; }
        th, td { border: 1px solid #2a3942; padding: 10px; text-align: left; }
        th { background: #202c33; color: #00a884; }
    </style>
</head>
<body>

    <h3>🚗 Carga Directa (87 Unidades)</h3>
    <div id="status">Estado: Listo para recibir datos</div>

    <textarea id="csv-input" placeholder="Pegue aquí las 87 líneas del CSV..."></textarea>

    <div class="row">
        <button class="primary" onclick="window.cargar()">Subir Datos Ahora</button>
        <button class="danger" onclick="window.limpiar()">Limpiar Todo</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>UF</th>
                <th>Información</th>
                <th>Cochera</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, writeBatch, getDocs, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo",
            authDomain: "gestionuf-remoto.firebaseapp.com",
            projectId: "gestionuf-remoto",
            storageBucket: "gestionuf-remoto.firebasestorage.app",
            messagingSenderId: "724452752860",
            appId: "1:724452752860:web:4d25585addcdcbd146e319"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "cocheras_edificio");

        // FUNCIÓN CARGAR (SIN .REPLACE ERRÓNEO)
        window.cargar = async () => {
            const area = document.getElementById("csv-input");
            const texto = area.value.trim();
            if(!texto) return alert("El cuadro está vacío.");

            const status = document.getElementById("status");
            status.innerText = "⏳ Procesando... por favor espere";

            const lineas = texto.split("\n");
            const batch = writeBatch(db);
            let contador = 0;

            try {
                lineas.forEach(linea => {
                    const columnas = linea.split(",");
                    if (columnas.length >= 2) {
                        // Extraemos la UF limpiando solo ese texto específico
                        let ufRaw = columnas.toString().replace(/[^0-9]/g, '');
                        
                        if (ufRaw && ufRaw.length <= 4) {
                            let ufID = ufRaw.padStart(4, '0');
                            let restoInfo = columnas.slice(1).join(" ").trim();
                            
                            const docRef = doc(db, "cocheras_edificio", "UF-" + ufID);
                            batch.set(docRef, {
                                uf: ufID,
                                prop: restoInfo || "Sin Nombre",
                                cochera: ufRaw,
                                patente: ""
                            }, { merge: true });
                            contador++;
                        }
                    }
                });

                await batch.commit();
                status.style.color = "#00a884";
                status.innerText = "✅ ¡Éxito! Se cargaron " + contador + " unidades correctamente.";
                area.value = "";
            } catch (err) {
                console.error(err);
                status.style.color = "#ff3b30";
                status.innerText = "❌ Error: " + err.message;
            }
        };

        // FUNCIÓN BORRAR
        window.limpiar = async () => {
            if(!confirm("¿Seguro que quieres borrar TODA la lista?")) return;
            const status = document.getElementById("status");
            status.innerText = "🗑️ Borrando base de datos...";
            const snap = await getDocs(colRef);
            const batch = writeBatch(db);
            snap.forEach(d => batch.delete(d.ref));
            await batch.commit();
            status.innerText = "✅ Base de datos vaciada.";
        };

        // VISOR EN TIEMPO REAL
        onSnapshot(query(colRef, orderBy("uf")), (snap) => {
            const tbody = document.getElementById("tbody");
            tbody.innerHTML = "";
            snap.forEach(d => {
                const i = d.data();
                const tr = document.createElement("tr");
                tr.innerHTML = `<td>${i.uf}</td><td>${i.prop}</td><td>${i.cochera}</td>`;
                tbody.appendChild(tr);
            });
        });
    </script>
</body>
</html>
