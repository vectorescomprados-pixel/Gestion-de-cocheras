<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover">
    <title>SISTEMA COCHERAS PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --card: #1c272e; --blue: #1d6ed7; --red: #e91e63; --yellow: #f59e0b; --grey: #4b5563; --text: #e9edef; --border: #2a3942; }
        body { margin: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: var(--text); padding: 10px; }
        
        .status-bar { text-align: center; font-size: 11px; font-weight: bold; color: #22c55e; margin-bottom: 15px; letter-spacing: 1px;}
        .panel { background: #111b21; padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
        .btn { height: 48px; border-radius: 8px; border: none; font-size: 10px; font-weight: 900; text-transform: uppercase; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-blue { background: var(--blue); } .btn-grey { background: var(--grey); } .btn-red { background: var(--red); } .btn-yellow { background: var(--yellow); color: #000; }

        /* Barra de Progreso */
        .progress-container { width: 100%; height: 8px; background: #0b141a; border-radius: 10px; margin: 10px 0; display: none; overflow: hidden; border: 1px solid var(--border); }
        #progress-bar { width: 0%; height: 100%; background: var(--yellow); transition: width 0.3s; }

        input, textarea { width: 100%; background: #1a242b; border: 1px solid #333; border-radius: 8px; color: #fff; padding: 12px; box-sizing: border-box; margin: 8px 0; font-size: 16px; outline: none; border-left: 3px solid var(--blue); }
        
        .card { background: #111b21; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .card-header { display: flex; align-items: center; padding: 18px; }
        .card-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: var(--blue); }
        .card-info { flex: 1; margin-left: 10px; }
        .card-title { font-size: 20px; font-weight: 900; color: var(--blue); }
        .card-actions { display: flex; gap: 18px; font-size: 18px; color: var(--blue); }
        
        .card-detail { display: none; padding: 0 18px 18px 24px; border-top: 1px solid var(--border); background: #162127; }
        .detail-item { margin-top: 10px; font-size: 13px; color: #8696a0; }
        .detail-item b { color: #fff; display: block; font-size: 14px; text-transform: uppercase; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 15px; }
        .modal-content { background: var(--card); width: 100%; max-width: 360px; padding: 25px; border-radius: 20px; border: 1px solid #32444e; }
    </style>
</head>
<body>

<div class="status-bar">● GESTIÓN DE COCHERAS</div>

<div class="panel">
    <div class="row">
        <button class="btn btn-yellow" onclick="document.getElementById('csv-file').click()"><i class="fas fa-file-upload"></i> SUBIR BASE</button>
        <button class="btn btn-red" onclick="abrirInfraccion()"><i class="fas fa-camera"></i> INFRACCIÓN</button>
        <button class="btn btn-grey" onclick="window.location.reload()"><i class="fas fa-sync"></i> RECARGAR</button>
    </div>
    
    <div class="progress-container" id="p-container">
        <div id="progress-bar"></div>
    </div>

    <input type="file" id="csv-file" accept=".csv" style="display:none" onchange="procesarCSV(event)">
    <input type="text" id="buscador" placeholder="Buscar UF, Propietario o Patente..." oninput="filtrar()">
</div>

<div id="lista-cocheras"></div>

<div id="modal-form" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--blue); margin-top:0; font-size: 18px;">EDITAR <span id="label-uf-modal"></span></h2>
        <input type="text" id="f-id" placeholder="Cochera Asignada">
        <input type="text" id="f-patente" placeholder="Patente">
        <input type="text" id="f-auto" placeholder="Vehículo">
        <textarea id="f-obs" placeholder="Observaciones..."></textarea>
        <div class="row" style="grid-template-columns: 1fr 1fr; margin-top:10px;">
            <button class="btn btn-blue" onclick="guardarCambios()">GUARDAR</button>
            <button class="btn btn-grey" onclick="cerrarModal()">VOLVER</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");

    let todasLasCocheras = [];
    let currentId = null;

    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        todasLasCocheras = snap.docs.map(d => ({id: d.id, ...d.data()}));
        renderizar(todasLasCocheras);
    });

    function renderizar(lista) {
        const cont = document.getElementById('lista-cocheras');
        cont.innerHTML = '';
        lista.forEach(c => {
            cont.innerHTML += `
                <div class="card">
                    <div class="card-bar"></div>
                    <div class="card-header">
                        <div class="card-info">
                            <div class="card-title">UF ${c.uf}</div>
                            <div style="font-size:14px; color:#fff">${c.prop || '---'}</div>
                        </div>
                        <div class="card-actions">
                            <i class="far fa-eye" onclick="toggleDetalle('${c.id}')"></i>
                            <i class="far fa-edit" onclick="abrirEditar('${c.id}')"></i>
                        </div>
                    </div>
                    <div class="card-detail" id="detail-${c.id}">
                        <div class="detail-item">NRO COCHERA: <b>${c.id_cochera || 'NO ASIGNADA'}</b></div>
                        <div class="detail-item">PATENTE: <b>${c.patente || '---'}</b></div>
                        <div class="detail-item">VEHÍCULO: <b>${c.auto || '---'}</b></div>
                        <div class="detail-item">OBSERVACIONES: <b>${c.obs || 'Sin notas'}</b></div>
                    </div>
                </div>`;
        });
    }

    // --- IMPORTADOR CSV MEJORADO ---
    window.procesarCSV = async (event) => {
        const file = event.target.files;
        if(!file) return;

        const reader = new FileReader();
        reader.onload = async (e) => {
            const content = e.target.result;
            const lines = content.split(/\r?\n/).filter(line => line.trim() !== ""); // Limpia lineas vacias
            
            const total = lines.length - 1; // Restamos cabecera
            if(total <= 0) return alert("Archivo vacío o sin datos");

            // Mostrar barra
            const container = document.getElementById('p-container');
            const bar = document.getElementById('progress-bar');
            container.style.display = 'block';
            bar.style.width = '0%';
            bar.style.background = 'var(--yellow)';

            let procesados = 0;

            for(let i = 0; i < lines.length; i++) {
                const cols = lines[i].split(',');
                const uf = cols ? cols.trim() : "";
                const prop = cols ? cols.trim() : "";

                // Saltar cabecera si existe
                if(uf.toLowerCase() === "uf" || !uf) continue;

                try {
                    await setDoc(doc(db, "cocheras_edificio", `UF-${uf}`), {
                        uf: uf, 
                        prop: prop
                    }, { merge: true });
                    
                    procesados++;
                    let porcentaje = (procesados / total) * 100;
                    bar.style.width = porcentaje + '%';
                } catch (err) {
                    console.error("Error en UF:", uf, err);
                }
            }

            bar.style.background = '#22c55e'; // Verde al terminar
            setTimeout(() => {
                container.style.display = 'none';
                alert(`¡Importación exitosa! Se cargaron ${procesados} registros.`);
            }, 1000);
        };
        reader.readAsText(file);
    };

    window.toggleDetalle = (id) => {
        const d = document.getElementById(`detail-${id}`);
        d.style.display = d.style.display === 'block' ? 'none' : 'block';
    };

    window.abrirEditar = (id) => {
        const c = todasLasCocheras.find(x => x.id === id);
        currentId = id;
        document.getElementById('label-uf-modal').innerText = `(UF ${c.uf})`;
        document.getElementById('f-id').value = c.id_cochera || "";
        document.getElementById('f-patente').value = c.patente || "";
        document.getElementById('f-auto').value = c.auto || "";
        document.getElementById('f-obs').value = c.obs || "";
        document.getElementById('modal-form').style.display = 'flex';
    };

    window.guardarCambios = async () => {
        await setDoc(doc(db, "cocheras_edificio", currentId), {
            id_cochera: document.getElementById('f-id').value,
            patente: document.getElementById('f-patente').value.toUpperCase(),
            auto: document.getElementById('f-auto').value,
            obs: document.getElementById('f-obs').value
        }, { merge: true });
        cerrarModal();
    };

    window.filtrar = () => {
        const v = document.getElementById('buscador').value.toLowerCase();
        renderizar(todasLasCocheras.filter(c => 
            c.uf.toLowerCase().includes(v) || 
            (c.prop && c.prop.toLowerCase().includes(v)) ||
            (c.patente && c.patente.toLowerCase().includes(v))
        ));
    };

    window.cerrarModal = () => document.getElementById('modal-form').style.display = 'none';
</script>
</body>
</html>
