<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>SISTEMA COCHERAS PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --card: #1c272e; --blue: #1d6ed7; --red: #e91e63; --yellow: #f59e0b; --text: #e9edef; --border: #2a3942; }
        body { margin: 0; background: var(--bg); font-family: sans-serif; color: var(--text); padding: 10px; }
        .panel { background: #111b21; padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn { height: 45px; border-radius: 8px; border: none; font-size: 10px; font-weight: bold; text-transform: uppercase; color: #fff; cursor: pointer; }
        .btn-yellow { background: var(--yellow); color: #000; }
        .btn-red { background: var(--red); }
        .btn-grey { background: #4b5563; }
        
        .progress-container { width: 100%; height: 25px; background: #000; border-radius: 5px; margin: 15px 0; display: none; overflow: hidden; border: 2px solid var(--yellow); position: relative; }
        #progress-bar { width: 0%; height: 100%; background: var(--yellow); transition: width 0.1s; }
        #progress-text { position: absolute; width: 100%; text-align: center; color: #000; font-weight: bold; line-height: 25px; z-index: 2; font-size: 11px; }

        .card { background: #111b21; border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--border); padding: 15px; border-left: 5px solid var(--blue); position: relative; }
        .card-title { font-size: 18px; font-weight: bold; color: var(--blue); margin-bottom: 5px; }
        .card-sub { font-size: 14px; color: #8696a0; margin-bottom: 3px; }
        .card-actions { position: absolute; right: 15px; top: 15px; font-size: 20px; color: var(--blue); }
        
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1a242b; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
    </style>
</head>
<body>

<div class="panel">
    <div class="row">
        <button class="btn btn-yellow" onclick="document.getElementById('csv-file').click()">SUBIR CSV</button>
        <button class="btn btn-red" id="btn-clear">BORRAR TODO</button>
        <button class="btn btn-grey" onclick="location.reload()">RECARGAR</button>
    </div>
    
    <div class="progress-container" id="p-container">
        <div id="progress-text">ESPERANDO ARCHIVO...</div>
        <div id="progress-bar"></div>
    </div>
    
    <input type="file" id="csv-file" accept=".csv" style="display:none">
    <input type="text" id="buscador" placeholder="Buscar por UF o Nombre...">
</div>

<div id="lista-container">
    <p style="text-align:center; color:#8696a0">Cargando base de datos...</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, setDoc, deleteDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");

    let baseDatos = [];

    // ESCUCHAR CAMBIOS (Siempre activo)
    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        baseDatos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        console.log("Datos recibidos:", baseDatos.length);
        dibujar(baseDatos);
    });

    function dibujar(datos) {
        const contenedor = document.getElementById('lista-container');
        if (datos.length === 0) {
            contenedor.innerHTML = '<p style="text-align:center; color:#8696a0">No hay datos cargados.<br>Usa el botón "SUBIR CSV".</p>';
            return;
        }
        
        contenedor.innerHTML = datos.map(item => `
            <div class="card">
                <div class="card-title">UF ${item.uf}</div>
                <div class="card-sub"><b>Titular:</b> ${item.prop || '---'}</div>
                <div class="card-sub"><b>Patente:</b> ${item.patente || 'SIN DATOS'}</div>
                <div class="card-actions"><i class="fas fa-chevron-right"></i></div>
            </div>
        `).join('');
    }

    // BORRAR TODO
    document.getElementById('btn-clear').onclick = async () => {
        if(!confirm("¿Eliminar los 87 registros?")) return;
        const s = await getDocs(colRef);
        const b = writeBatch(db);
        s.docs.forEach(d => b.delete(d.ref));
        await b.commit();
    };

    // IMPORTADOR MEJORADO
    document.getElementById('csv-file').onchange = (e) => {
        const archivo = e.target.files;
        if(!archivo) return;

        const lector = new FileReader();
        const pCont = document.getElementById('p-container');
        const pBar = document.getElementById('progress-bar');
        const pText = document.getElementById('progress-text');

        pCont.style.display = 'block';

        lector.onload = async (evento) => {
            const contenido = evento.target.result;
            const lineas = contenido.split(/\r?\n/).filter(l => l.trim() !== "");
            
            // Empezamos en 1 para saltar el encabezado (UF, Propietario...)
            for(let i = 1; i < lineas.length; i++) {
                const columnas = lineas[i].split(',');
                const uf = columnas?.trim();

                if(!uf || isNaN(parseInt(uf))) continue;

                // Mantenemos el formato 0001, 0002...
                const ufFormateada = uf.padStart(4, '0');
                const prop = columnas?.trim() || "";
                const inq = columnas?.trim() || "";
                const mostrar = inq ? `${prop} / ${inq}` : prop;

                await setDoc(doc(db, "cocheras_edificio", "UF-" + ufFormateada), {
                    uf: ufFormateada,
                    prop: mostrar,
                    patente: "",
                    auto: ""
                }, { merge: true });

                let porcentaje = Math.round((i / (lineas.length - 1)) * 100);
                pBar.style.width = porcentaje + "%";
                pText.innerText = "CARGANDO: " + porcentaje + "%";
            }
            
            alert("¡Importación terminada!");
            pCont.style.display = 'none';
        };
        lector.readAsText(archivo);
    };

    // BUSCADOR EN TIEMPO REAL
    document.getElementById('buscador').oninput = (e) => {
        const busqueda = e.target.value.toLowerCase();
        const filtrados = baseDatos.filter(c => 
            c.uf.includes(busqueda) || 
            c.prop.toLowerCase().includes(busqueda)
        );
        dibujar(filtrados);
    };
</script>
</body>
</html>
