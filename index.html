<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>SISTEMA COCHERAS PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --card: #1c272e; --blue: #1d6ed7; --red: #e91e63; --yellow: #f59e0b; --text: #e9edef; --border: #2a3942; }
        body { margin: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: var(--text); padding: 10px; }
        .panel { background: #111b21; padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn { height: 45px; border-radius: 8px; border: none; font-size: 10px; font-weight: bold; text-transform: uppercase; color: #fff; cursor: pointer; }
        .btn-yellow { background: var(--yellow); color: #000; } .btn-red { background: var(--red); } .btn-grey { background: #4b5563; }
        
        .progress-container { width: 100%; height: 25px; background: #000; border-radius: 5px; margin: 15px 0; display: none; overflow: hidden; border: 2px solid var(--yellow); position: relative; }
        #progress-bar { width: 0%; height: 100%; background: var(--yellow); transition: width 0.1s; }
        #progress-text { position: absolute; width: 100%; text-align: center; color: #000; font-weight: bold; line-height: 25px; z-index: 2; font-size: 11px; }

        #lista-container { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .card { background: #111b21; border-radius: 10px; border: 1px solid var(--border); padding: 15px; border-left: 5px solid var(--blue); position: relative; }
        .card-title { font-size: 18px; font-weight: bold; color: var(--blue); margin-bottom: 5px; }
        .card-sub { font-size: 13px; color: #8696a0; }
        .card-sub b { color: #fff; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1a242b; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; font-size: 16px; outline: none; }
    </style>
</head>
<body>

<div class="panel">
    <div class="row">
        <button class="btn btn-yellow" onclick="document.getElementById('csv-file').click()">SUBIR CSV</button>
        <button class="btn btn-red" id="btn-borrar">BORRAR TODO</button>
        <button class="btn btn-grey" onclick="location.reload()">RECARGAR</button>
    </div>
    
    <div class="progress-container" id="p-container">
        <div id="progress-text">ESPERANDO...</div>
        <div id="progress-bar"></div>
    </div>
    
    <input type="file" id="csv-file" accept=".csv" style="display:none">
    <input type="text" id="buscador" placeholder="Buscar UF (ej: 0001) o Nombre...">
</div>

<div id="lista-container">
    <p style="text-align:center; color:#8696a0">Cargando base de datos...</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, setDoc, deleteDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");

    let cacheDatos = [];

    // --- ESCUCHA DE FIREBASE ---
    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        cacheDatos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        dibujarUI(cacheDatos);
    });

    function dibujarUI(datos) {
        const contenedor = document.getElementById('lista-container');
        if (datos.length === 0) {
            contenedor.innerHTML = '<p style="text-align:center; color:#8696a0">BASE VACÍA.<br>Por favor, suba el archivo CSV.</p>';
            return;
        }
        contenedor.innerHTML = datos.map(item => `
            <div class="card">
                <div class="card-title">UF ${item.uf}</div>
                <div class="card-sub"><b>Nombre:</b> ${item.prop || '---'}</div>
                <div class="card-sub"><b>Patente:</b> ${item.patente || 'SIN CARGAR'}</div>
            </div>
        `).join('');
    }

    // --- BORRAR TODO ---
    document.getElementById('btn-borrar').onclick = async () => {
        if(!confirm("¿Borrar todos los registros de la base?")) return;
        const snap = await getDocs(colRef);
        const batch = writeBatch(db);
        snap.docs.forEach(d => batch.delete(d.ref));
        await batch.commit();
        alert("Base limpiada.");
    };

    // --- IMPORTADOR REFORZADO ---
    document.getElementById('csv-file').onchange = (e) => {
        const file = e.target.files;
        if(!file) return;

        const reader = new FileReader();
        const pCont = document.getElementById('p-container');
        const pBar = document.getElementById('progress-bar');
        const pText = document.getElementById('progress-text');

        pCont.style.display = 'block';

        reader.onload = async (ev) => {
            const contenido = ev.target.result;
            const lineas = contenido.split(/\r?\n/).filter(l => l.trim().length > 0);
            
            // Empezamos en 1 para saltar el encabezado
            for(let i = 1; i < lineas.length; i++) {
                // Separación por comas limpia
                const cols = lineas[i].split(',');
                let ufNum = cols?.trim();

                if(!ufNum || isNaN(parseInt(ufNum))) continue;

                // Forzamos 4 dígitos (0001) para que el buscador no falle
                const ufId = ufNum.padStart(4, '0');
                
                // Si el archivo tiene propietario (col 1) e inquilino (col 3)
                const prop = cols?.trim() || "";
                const inq = cols?.trim() || "";
                const nombreFinal = inq ? `${prop} / ${inq}` : prop;

                // Subida uno a uno para asegurar persistencia
                await setDoc(doc(db, "cocheras_edificio", "UF-" + ufId), {
                    uf: ufId,
                    prop: nombreFinal,
                    patente: "",
                    auto: ""
                }, { merge: true });

                let progreso = Math.round((i / (lineas.length - 1)) * 100);
                pBar.style.width = progreso + "%";
                pText.innerText = "PROCESANDO: " + progreso + "%";
            }
            
            pCont.style.display = 'none';
            alert("¡Importación exitosa! Los datos aparecerán ahora.");
        };
        reader.readAsText(file);
    };

    // --- BUSCADOR CON NORMALIZACIÓN ---
    document.getElementById('buscador').oninput = (e) => {
        let val = e.target.value.trim().toLowerCase();
        
        // Si buscas "1", el sistema busca "0001" automáticamente
        let buscado = val;
        if (!isNaN(val) && val !== "") {
            buscado = val.padStart(4, '0');
        }

        const filtrados = cacheDatos.filter(c => 
            c.uf.includes(buscado) || 
            c.prop.toLowerCase().includes(val)
        );
        dibujarUI(filtrados);
    };
</script>
</body>
</html>
