<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SISTEMA COCHERAS - CARGA 87</title>
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; margin: 20px; }
        textarea { width: 100%; min-height: 150px; background: #111b21; color: #00a884; border: 1px solid #2a3942; padding: 10px; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .row { display: flex; gap: 12px; margin: 15px 0; }
        button { padding: 12px 20px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; flex: 1; text-transform: uppercase; }
        .danger { background: #ff3b30; color: white; }
        .primary { background: #00a884; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #111b21; font-size: 14px; }
        th, td { border: 1px solid #2a3942; padding: 10px; text-align: left; }
        th { background: #202c33; color: #00a884; }
        #status { color: #e1ff00; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>

<body>
    <h3>🚗 Carga de 87 Unidades</h3>
    
    <div id="status">Estado: Listo para cargar</div>

    <textarea id="csv-input" placeholder="Pega las 87 líneas aquí..."></textarea>

    <div class="row">
        <button class="primary" onclick="window.cargar()">SUBIR DATOS</button>
        <button class="danger" onclick="window.limpiar()">BORRAR TODO</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>UF</th>
                <th>Datos</th>
                <th>Cochera</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, writeBatch, getDocs, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo",
            authDomain: "gestionuf-remoto.firebaseapp.com",
            projectId: "gestionuf-remoto",
            storageBucket: "gestionuf-remoto.firebasestorage.app",
            messagingSenderId: "724452752860",
            appId: "1:724452752860:web:4d25585addcdcbd146e319"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "cocheras_edificio");

        // --- FUNCIÓN CARGAR ---
        window.cargar = async () => {
            const txt = document.getElementById("csv-input").value.trim();
            if(!txt) return alert("Pega los datos");

            const status = document.getElementById("status");
            status.innerText = "Cargando...";

            const lineas = txt.split("\n");
            const batch = writeBatch(db);
            let contador = 0;

            lineas.forEach(linea => {
                const columnas = linea.split(",");
                if(columnas.length >= 2) {
                    // Limpiamos solo la UF
                    let ufOriginal = columnas.replace(/[^0-9]/g, '');
                    if(ufOriginal && ufOriginal.length <= 4) {
                        let ufID = ufOriginal.padStart(4, '0');
                        // El resto de la línea lo tomamos como nombre directamente
                        let info = columnas.slice(1).join(" ").trim();
                        
                        const docRef = doc(db, "cocheras_edificio", "UF-" + ufID);
                        batch.set(docRef, {
                            uf: ufID,
                            prop: info || "S/D",
                            cochera: ufOriginal,
                            patente: ""
                        });
                        contador++;
                    }
                }
            });

            await batch.commit();
            status.innerText = "¡Listo! " + contador + " registros cargados.";
            document.getElementById("csv-input").value = "";
        };

        // --- FUNCIÓN BORRAR ---
        window.limpiar = async () => {
            if(!confirm("¿Borrar todo?")) return;
            const snap = await getDocs(colRef);
            const batch = writeBatch(db);
            snap.forEach(d => batch.delete(d.ref));
            await batch.commit();
            document.getElementById("status").innerText = "Base vacía.";
        };

        // --- ESCUCHA EN VIVO ---
        onSnapshot(query(colRef, orderBy("uf")), (snap) => {
            const tbody = document.getElementById("tbody");
            tbody.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                const tr = document.createElement("tr");
                tr.innerHTML = `<td>${data.uf}</td><td>${data.prop}</td><td>${data.cochera}</td>`;
                tbody.appendChild(tr);
            });
        });
    </script>
</body>
</html>
