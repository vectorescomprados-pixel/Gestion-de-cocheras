<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA COCHERAS - RESET TOTAL</title>
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        .header { position: sticky; top: 0; background: #0b141a; padding: 10px 0; z-index: 100; border-bottom: 1px solid #2a3942; }
        .search-box { width: 100%; padding: 12px; background: #202c33; border: 1px solid #2a3942; border-radius: 8px; color: white; font-size: 16px; box-sizing: border-box; }
        #lista { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .card { background: #111b21; padding: 15px; border-radius: 10px; border-left: 5px solid #00a884; }
        .uf-tag { color: #00a884; font-weight: bold; font-size: 0.9em; }
        .nombre { font-size: 1.1em; margin: 5px 0; color: #e9edef; }
        
        .admin-panel { margin-top: 40px; padding: 20px; border: 2px dashed #ff3b30; border-radius: 15px; background: #1c1111; }
        textarea { width: 100%; height: 100px; background: #000; color: #0f0; border: 1px solid #444; margin: 10px 0; padding: 10px; box-sizing: border-box; }
        .btn { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; font-size: 14px; text-transform: uppercase; }
        .btn-red { background: #ff3b30; color: white; }
        .btn-green { background: #00a884; color: white; }
        #status { font-size: 13px; color: #ff3b30; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0 0 10px 0;">Cocheras Edificio</h3>
    <input type="text" id="buscador" class="search-box" placeholder="🔎 Buscar UF o Nombre...">
</div>

<div id="lista"></div>

<div class="admin-panel">
    <h4 style="margin:0; color: #ff3b30;">⚠️ REINICIO DE EMERGENCIA</h4>
    <p style="font-size: 11px; color: #8696a0;">Usa el botón rojo para vaciar TODO antes de cargar.</p>
    <button class="btn btn-red" onclick="window.resetAbsoluto()">BORRAR TODA LA BASE DE DATOS</button>
    <textarea id="csv-input" placeholder="Pega el CSV aquí..."></textarea>
    <button class="btn btn-green" onclick="window.cargarLimpio()">CARGAR DATOS NUEVOS</button>
    <div id="status">Estado: Listo</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, writeBatch, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");

    let datosLocales = [];

    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        const listado = document.getElementById('lista');
        listado.innerHTML = "";
        datosLocales = [];

        snap.forEach(docSnap => {
            const i = docSnap.data();
            // Evitamos duplicados visuales comparando IDs si fuera necesario
            datosLocales.push(i);
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<div class="uf-tag">UF ${i.uf}</div><div class="nombre">${i.prop}</div><div style="color:#8696a0; font-size:0.9em;">Cochera: <b>${i.cochera}</b></div>`;
            listado.appendChild(div);
        });
    });

    document.getElementById('buscador').oninput = (e) => {
        const t = e.target.value.toLowerCase();
        const filtrados = datosLocales.filter(i => i.uf.includes(t) || i.prop.toLowerCase().includes(t));
        const listado = document.getElementById('lista');
        listado.innerHTML = "";
        filtrados.forEach(i => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<div class="uf-tag">UF ${i.uf}</div><div class="nombre">${i.prop}</div><div style="color:#8696a0; font-size:0.9em;">Cochera: <b>${i.cochera}</b></div>`;
            listado.appendChild(div);
        });
    };

    // FUNCIÓN DE BORRADO TOTAL REAL
    window.resetAbsoluto = async () => {
        if(!confirm("¿SEGURO? Se borrará TODO de la nube para eliminar duplicados.")) return;
        document.getElementById('status').innerText = "BORRANDO... ESPERE";
        const snap = await getDocs(colRef);
        
        // Borramos uno por uno para asegurar que no quede NADA
        for (const d of snap.docs) {
            await deleteDoc(doc(db, "cocheras_edificio", d.id));
        }
        
        alert("Base de datos TOTALMENTE vacía. Ya no deberían quedar duplicados.");
        document.getElementById('status').innerText = "Base vacía.";
    };

    window.cargarLimpio = async () => {
        const input = document.getElementById('csv-input');
        const texto = input.value.trim();
        if(!texto) return alert("Pega los datos");

        const status = document.getElementById('status');
        const lineas = texto.split(/\r?\n/).filter(l => l.includes(','));
        
        try {
            let batch = writeBatch(db);
            let ufsYaVistas = new Set();
            let contador = 0;

            for (let f of lineas) {
                if (f.toUpperCase().includes("UF,PROPIETARIO")) continue;
                const c = f.split(',');
                let ufRaw = String(c || "").replace(/[^0-9]/g, '');
                if(!ufRaw) continue;

                let ufID = ufRaw.padStart(4, '0');
                if(ufsYaVistas.has(ufID)) continue;
                ufsYaVistas.add(ufID);

                let prop = String(c || "S/D").trim();
                let inq = String(c || "").trim();
                let cocheraFinal = inq ? inq.split(' ').pop() : ufRaw;

                // Forzamos el ID de documento único
                const docRef = doc(db, "cocheras_edificio", "UF-" + ufID);
                batch.set(docRef, {
                    uf: ufID,
                    prop: inq ? prop + " / " + inq : prop,
                    cochera: String(cocheraFinal),
                    patente: ""
                }, { merge: true });

                contador++;
            }

            await batch.commit();
            alert("Carga terminada. Registros únicos: " + contador);
            input.value = "";
            status.innerText = "Sincronizado correctamente.";
        } catch (e) {
            alert("Error: " + e.message);
        }
    };
</script>
</body>
</html>
