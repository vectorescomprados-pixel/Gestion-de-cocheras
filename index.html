<script type="module">
    // ... (Mantén el inicio de tu script igual)

    window.procesarCSV = async (event) => {
        const file = event.target.files;
        if(!file) return;

        console.log("Archivo detectado:", file.name);

        const reader = new FileReader();
        reader.onload = async (e) => {
            const content = e.target.result;
            const lines = content.split(/\r?\n/).filter(line => line.trim() !== "");
            
            if(lines.length < 1) return alert("El archivo parece estar vacío.");

            // DETECTOR DE SEPARADOR (Coma o Punto y Coma)
            const firstLine = lines;
            const separator = firstLine.includes(';') ? ';' : ',';
            console.log("Separador detectado:", separator);

            const total = lines.length;
            const container = document.getElementById('p-container');
            const bar = document.getElementById('progress-bar');
            
            container.style.display = 'block';
            bar.style.width = '0%';
            bar.style.background = 'var(--yellow)';

            let procesados = 0;
            let errores = 0;

            for(let line of lines) {
                const cols = line.split(separator);
                
                // Limpiamos comillas si el Excel las puso (ej: "101")
                const uf = cols ? cols.replace(/["']/g, "").trim() : "";
                const prop = cols ? cols.replace(/["']/g, "").trim() : "";

                // Ignorar cabeceras comunes
                if(uf.toLowerCase() === "uf" || uf.toLowerCase() === "unidad" || !uf) {
                    procesados++; 
                    continue; 
                }

                try {
                    // REFERENCIA A FIREBASE
                    await setDoc(doc(db, "cocheras_edificio", `UF-${uf}`), {
                        uf: uf, 
                        prop: prop
                    }, { merge: true });
                    
                    procesados++;
                    let porcentaje = (procesados / total) * 100;
                    bar.style.width = porcentaje + '%';
                } catch (err) {
                    console.error("Error subiendo UF:", uf, err);
                    errores++;
                }
            }

            bar.style.background = errores > 0 ? 'var(--red)' : '#22c55e';
            
            setTimeout(() => {
                container.style.display = 'none';
                if(errores > 0) {
                    alert(`Proceso terminado con ${errores} errores. Revisa la consola.`);
                } else {
                    alert(`¡Éxito! Se procesaron ${procesados} líneas correctamente.`);
                }
                // Limpiar el input para poder subir el mismo archivo si se desea
                event.target.value = '';
            }, 1000);
        };

        reader.onerror = () => alert("Error al leer el archivo físico.");
        reader.readAsText(file);
    };

    // ... (El resto del código se mantiene igual)
</script>
