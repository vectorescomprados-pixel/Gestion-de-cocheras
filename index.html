<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>SISTEMA COCHERAS - FIX FINAL</title>
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; padding: 20px; }
        .box { border: 2px solid #2a3942; padding: 15px; border-radius: 10px; background: #111b21; margin-bottom: 20px; }
        #log { background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 11px; height: 150px; overflow-y: auto; border: 1px solid #333; white-space: pre-wrap; }
        .card { background: #1c272e; padding: 10px; margin-top: 10px; border-radius: 5px; border-left: 5px solid #f59e0b; }
        input[type="file"] { padding: 10px; background: #1d6ed7; color: white; width: 100%; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="box">
    <h3>PASO 1: Seleccionar Archivo</h3>
    <input type="file" id="csv-input" accept=".csv">
    <div id="log">Estado: Sistema listo.</div>
</div>

<div class="box">
    <button style="background:#e91e63; color:white; padding:10px; width:100%; border:none; border-radius:5px; cursor:pointer;" id="btn-borrar">BORRAR TODA LA BASE</button>
</div>

<div id="resultado"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");

    const logger = (msg) => {
        const l = document.getElementById('log');
        l.innerText += "\n> " + msg;
        l.scrollTop = l.scrollHeight;
    };

    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        const res = document.getElementById('resultado');
        res.innerHTML = snap.docs.map(d => {
            const i = d.data();
            return `<div class="card">UF: ${i.uf} | Cochera: ${i.cochera}<br>Prop: ${i.prop}</div>`;
        }).join('');
    });

    // MÉTODO DE LECTURA ULTRA-COMPATIBLE
    document.getElementById('csv-input').onchange = function(evento) {
        // Usamos el evento directo para evitar el 'undefined'
        const archivo = evento.target.files;
        
        if (!archivo) {
            logger("Error: No se pudo capturar el archivo.");
            return;
        }

        logger("Archivo capturado: " + archivo.name);
        
        const lector = new FileReader();
        
        lector.onload = async function(e) {
            try {
                const contenido = e.target.result;
                if (!contenido) {
                    logger("Error: El archivo está vacío.");
                    return;
                }

                const lineas = contenido.split(/\r?\n/).filter(l => l.trim() !== "");
                logger("Líneas encontradas: " + lineas.length);

                const batch = writeBatch(db);
                let contador = 0;

                for (let i = 1; i < lineas.length; i++) {
                    const columnas = lineas[i].split(';');
                    
                    const rawUF = columnas ? columnas.trim() : "";
                    if (!rawUF || isNaN(parseInt(rawUF))) continue;

                    const ufNorm = rawUF.padStart(4, '0');
                    const cochera = (columnas && columnas.trim() !== "") ? columnas.trim() : rawUF;
                    const prop = (columnas && columnas.trim() !== "") ? columnas.trim() : "S/D";
                    const inq = (columnas && columnas.trim() !== "") ? columnas.trim() : "";
                    const nombreFinal = inq ? prop + " / " + inq : prop;

                    const ref = doc(db, "cocheras_edificio", "UF-" + ufNorm);
                    batch.set(ref, { 
                        uf: ufNorm, 
                        cochera: cochera, 
                        prop: nombreFinal, 
                        patente: "",
                        auto: "" 
                    }, { merge: true });
                    
                    contador++;
                }

                logger("Subiendo " + contador + " filas a la nube...");
                await batch.commit();
                logger("¡SINCRO EXITOSA!");

            } catch (err) {
                logger("ERROR DE PROCESAMIENTO: " + err.message);
            }
        };

        lector.readAsText(archivo, "ISO-8859-1");
    };

    document.getElementById('btn-borrar').onclick = async () => {
        if(!confirm("¿Borrar todo?")) return;
        const snap = await getDocs(colRef);
        const b = writeBatch(db);
        snap.docs.forEach(d => b.delete(d.ref));
        await b.commit();
        logger("Base borrada.");
    };
</script>
</body>
</html>
