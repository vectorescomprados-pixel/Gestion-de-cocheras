<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>SISTEMA COCHERAS - FIX FINAL</title>
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; padding: 15px; }
        .box { border: 1px solid #2a3942; padding: 15px; border-radius: 10px; background: #111b21; margin-bottom: 15px; }
        #log { background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 11px; height: 100px; overflow-y: auto; border: 1px solid #333; }
        .card { background: #1c272e; padding: 12px; margin-top: 8px; border-radius: 8px; border-left: 5px solid #1d6ed7; }
        .btn-blue { background: #1d6ed7; color: white; padding: 15px; width: 100%; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <input type="file" id="archivo" class="btn-blue">
    <div id="log">Estado: Esperando...</div>
</div>

<div id="lista"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, writeBatch, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");

    const logger = (m) => { document.getElementById('log').innerText += "\n> " + m; };

    // Mostrar datos
    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        document.getElementById('lista').innerHTML = snap.docs.map(d => {
            const i = d.data();
            return `<div class="card"><b>UF ${i.uf}</b> - Cochera: ${i.cochera}<br>${i.prop}</div>`;
        }).join('');
    });

    document.getElementById('archivo').onchange = function(e) {
        const file = e.target.files;
        if (!file) return;

        logger("Leyendo...");
        const reader = new FileReader();

        reader.onload = async (ev) => {
            try {
                const texto = ev.target.result;
                // Dividimos líneas de forma más simple
                const filas = texto.split(/\r?\n/).filter(linea => linea.includes(';'));
                logger("Filas: " + filas.length);

                let batch = writeBatch(db);
                let count = 0;

                for (let i = 0; i < filas.length; i++) {
                    // Saltamos el encabezado si detectamos la palabra "UF"
                    if (filas[i].startsWith("UF")) continue;

                    const cols = filas[i].split(';');
                    const rawUF = cols ? cols.trim() : "";
                    if (!rawUF || isNaN(parseInt(rawUF))) continue;

                    const ufNorm = rawUF.padStart(4, '0');
                    const coch = (cols && cols.trim()) ? cols.trim() : rawUF;
                    const prop = cols ? cols.trim() : "S/D";
                    const inq = cols ? cols.trim() : "";
                    
                    const ref = doc(db, "cocheras_edificio", "UF-" + ufNorm);
                    batch.set(ref, {
                        uf: ufNorm,
                        cochera: coch,
                        prop: inq ? `${prop} / ${inq}` : prop,
                        patente: ""
                    }, { merge: true });

                    count++;
                    
                    // Guardar cada 400 para no saturar
                    if (count % 400 === 0) {
                        await batch.commit();
                        batch = writeBatch(db);
                    }
                }

                await batch.commit();
                logger("¡CARGA EXITOSA!");
            } catch (err) {
                logger("ERROR: " + err.message);
            }
        };

        // Cambiamos a UTF-8 por defecto, si fallan los acentos probamos ISO luego
        reader.readAsText(file);
    };
</script>
</body>
</html>
