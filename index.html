<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA COCHERAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [inquilino, setInquilino] = useState('');

            useEffect(() => {
                lucide.createIcons();
            }, [inquilino]);

            // 1. EL BOTÓN DE LA CASITA (Ahora funcional)
            const irAlHub = () => {
                window.location.href = 'index.html'; 
            };

            return (
                <div className="p-4 max-w-4xl mx-auto">
                    {/* Header */}
                    <div className="flex items-center gap-4 mb-6 border-b border-slate-700 pb-4">
                        <button 
                            onClick={irAlHub}
                            className="p-2 border border-slate-600 rounded hover:bg-slate-800 transition-colors"
                        >
                            <i data-lucide="home" class="text-blue-400"></i>
                        </button>
                        <h1 className="text-xl font-bold uppercase tracking-tight">Gestión de Cocheras - Carga</h1>
                    </div>

                    {/* 2. CAMPOS SINCRONIZADOS Y RENOMBRADOS */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="flex flex-col gap-1">
                            <label className="text-xs font-bold text-slate-400 uppercase">Inquilino</label>
                            <input 
                                type="text" 
                                value={inquilino}
                                onChange={(e) => setInquilino(e.target.value)}
                                className="bg-slate-800 border border-slate-700 p-3 rounded outline-none focus:border-blue-500"
                                placeholder="Ingrese nombre..."
                            />
                        </div>

                        <div className="flex flex-col gap-1">
                            <label className="text-xs font-bold text-slate-400 uppercase">Inquilino</label>
                            <input 
                                type="text" 
                                value={inquilino} // 3. LO QUE APARECE EN EL PRIMERO, APARECE ACÁ
                                readOnly 
                                className="bg-slate-900 border border-slate-800 p-3 rounded text-slate-500 cursor-not-allowed"
                            />
                        </div>
                    </div>

                    {/* Botón de acción simple (Como estaba en tu app) */}
                    <div className="mt-8">
                        <button className="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded font-bold uppercase text-sm transition-all">
                            Guardar Carga
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
