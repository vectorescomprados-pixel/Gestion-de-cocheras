<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA COCHERAS - LISTADO</title>
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; padding: 15px; margin: 0; }
        .header { position: sticky; top: 0; background: #0b141a; padding-bottom: 15px; z-index: 100; border-bottom: 1px solid #2a3942; }
        
        .search-box { 
            width: 100%; 
            padding: 12px 15px; 
            background: #202c33; 
            border: 1px solid #2a3942; 
            border-radius: 10px; 
            color: white; 
            font-size: 16px; 
            box-sizing: border-box;
            outline: none;
            margin-top: 10px;
        }
        .search-box:focus { border-color: #00a884; }

        #lista { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            margin-top: 20px;
        }

        .card { 
            background: #111b21; 
            padding: 15px; 
            border-radius: 12px; 
            border-left: 5px solid #00a884;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .uf-num { 
            font-weight: bold; 
            color: #00a884; 
            font-size: 1.1em; 
            margin-bottom: 10px; 
            border-bottom: 1px solid #2a3942;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .info-group { margin-bottom: 10px; }
        .info-group:last-child { margin-bottom: 0; }

        .label { 
            font-size: 0.7em; 
            color: #8696a0; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            display: block;
        }

        .data-text { 
            color: #e9edef; 
            font-size: 1.05em; 
            font-weight: 500;
        }

        .tel-link {
            color: #53bdeb;
            text-decoration: none;
            font-size: 0.95em;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 2px;
        }

        .no-results { text-align: center; color: #8696a0; margin-top: 50px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin: 10px 0; color: #e9edef;">Cocheras Edificio</h2>
    <input type="text" id="buscador" class="search-box" placeholder="UF, Propietario o Inquilino...">
</div>

<div id="lista">
    <p style="text-align:center; color:#8696a0;">Conectando con la base de datos...</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const colRef = collection(db, "cocheras_edificio");

    let todosLosDatos = [];

    // 1. Escuchar datos en tiempo real
    onSnapshot(query(colRef, orderBy("uf")), (snap) => {
        todosLosDatos = snap.docs.map(d => d.data());
        renderizar(todosLosDatos);
    });

    // 2. Función para dibujar las tarjetas con la nueva estructura
    function renderizar(datos) {
        const contenedor = document.getElementById('lista');
        contenedor.innerHTML = ""; 

        if (datos.length === 0) {
            contenedor.innerHTML = '<div class="no-results">No se encontraron coincidencias.</div>';
            return;
        }

        datos.forEach(i => {
            const card = document.createElement('div');
            card.className = 'card';
            
            // Creamos la estructura solicitada: Propietario, Tel, Inquilino, Tel
            card.innerHTML = `
                <div class="uf-num">
                    <span>UF ${i.uf}</span>
                    <span style="color:#8696a0; font-size: 0.8em;">Cochera: ${i.cochera || '-'}</span>
                </div>
                
                <div class="info-group">
                    <span class="label">Propietario</span>
                    <div class="data-text">${i.prop || '---'}</div>
                    <a href="tel:${i.tel_prop}" class="tel-link">📞 ${i.tel_prop || 'Sin teléfono'}</a>
                </div>

                <div class="info-group" style="margin-top: 12px; border-top: 1px dashed #2a3942; padding-top: 10px;">
                    <span class="label">Inquilino</span>
                    <div class="data-text">${i.inquilino || 'Sin inquilino'}</div>
                    <a href="tel:${i.tel_inq}" class="tel-link">📞 ${i.tel_inq || 'Sin teléfono'}</a>
                </div>
            `;
            contenedor.appendChild(card);
        });
    }

    // 3. Filtro del buscador (Mejorado para incluir inquilinos)
    document.getElementById('buscador').addEventListener('input', (e) => {
        const busqueda = e.target.value.toLowerCase();
        const filtrados = todosLosDatos.filter(i => {
            const uf = String(i.uf).toLowerCase();
            const prop = (i.prop || "").toLowerCase();
            const inq = (i.inquilino || "").toLowerCase();
            
            return uf.includes(busqueda) || prop.includes(busqueda) || inq.includes(busqueda);
        });
        renderizar(filtrados);
    });

</script>
</body>
</html>
